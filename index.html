<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Neo Galaga Tribute</title>
<style>
:root{--fg:#f4f7ff;--a:#74e6ff}
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:"Courier New",Consolas,monospace;color:var(--fg)}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;inset:0;pointer-events:none;display:flex;justify-content:space-between;padding:12px 18px;font-size:clamp(20px,1.6vw,30px);font-weight:700;letter-spacing:.02em;text-shadow:0 0 6px #000}
#msg{position:fixed;left:50%;top:84%;transform:translate(-50%,-50%);pointer-events:none;text-align:center;white-space:pre-line;text-shadow:0 0 8px #000;font-size:clamp(20px,1.8vw,30px)}
#feedbackBtn{position:fixed;top:62px;right:16px;z-index:30;border:1px solid rgba(136,245,255,.6);background:rgba(8,18,35,.75);color:#dbf8ff;padding:7px 11px;font:700 14px/1 "Courier New",Consolas,monospace;border-radius:999px;cursor:pointer;backdrop-filter:blur(2px);transition:background .14s,border-color .14s}
#feedbackBtn:hover{background:rgba(19,43,84,.85);border-color:rgba(136,245,255,.95)}
#exportBtn{position:fixed;top:98px;right:16px;z-index:30;border:1px solid rgba(170,205,255,.55);background:rgba(10,15,28,.7);color:#e6f1ff;padding:7px 11px;font:700 13px/1 "Courier New",Consolas,monospace;border-radius:999px;cursor:pointer;backdrop-filter:blur(2px);transition:background .14s,border-color .14s}
#exportBtn:hover{background:rgba(26,39,73,.85);border-color:rgba(170,205,255,.9)}
#recordBtn{position:fixed;top:134px;right:16px;z-index:30;border:1px solid rgba(255,115,115,.55);background:rgba(28,10,10,.72);color:#ffe9e9;padding:7px 11px;font:700 13px/1 "Courier New",Consolas,monospace;border-radius:999px;cursor:pointer;backdrop-filter:blur(2px);transition:background .14s,border-color .14s}
#recordBtn:hover{background:rgba(64,17,17,.88);border-color:rgba(255,115,115,.92)}
#recordBtn.active{border-color:rgba(255,84,84,.95);background:rgba(92,15,15,.9);color:#fff3f3}
#recordBtn[disabled]{opacity:.45;cursor:default}
#feedbackModal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.58);backdrop-filter:blur(2px)}
#feedbackModal.open{display:flex}
#feedbackPanel{width:min(560px,calc(100vw - 26px));background:rgba(8,13,25,.96);border:1px solid rgba(136,245,255,.4);box-shadow:0 12px 60px rgba(0,0,0,.7);padding:14px}
#feedbackPanel h2{margin:0 0 10px;font-size:20px;letter-spacing:.03em}
#feedbackPanel label{display:block;margin:8px 0 5px;font-size:14px;color:#bfefff}
#feedbackPanel select,#feedbackPanel input,#feedbackPanel textarea{width:100%;border:1px solid #2f5f81;background:#050a14;color:#f4f7ff;padding:8px;font:15px/1.3 "Courier New",Consolas,monospace;box-sizing:border-box}
#feedbackPanel textarea{min-height:120px;resize:vertical}
#feedbackActions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
#feedbackActions button{border:1px solid #3d85b0;background:#0d1c36;color:#e5f9ff;padding:8px 13px;font:700 14px/1 "Courier New",Consolas,monospace;cursor:pointer}
#feedbackActions button[type="submit"]{background:#13395f;border-color:#5dc2ff}
#feedbackStatus{min-height:18px;font-size:13px;color:#8ed5ff;margin-top:8px}
#feedbackStatus.err{color:#ff8c8c}
#feedbackToast{position:fixed;left:50%;top:24px;transform:translateX(-50%);z-index:50;background:rgba(9,30,55,.96);border:1px solid rgba(136,245,255,.7);color:#dff7ff;padding:8px 14px;font:700 14px/1.2 "Courier New",Consolas,monospace;display:none}
#feedbackToast.show{display:block}
.k{color:var(--a)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="left"></div><div id="right"></div></div>
<div id="msg"></div>
<button id="feedbackBtn" aria-expanded="false" aria-controls="feedbackModal">Feedback</button>
<button id="exportBtn">Export Log</button>
<button id="recordBtn" type="button">Auto Video: On</button>
<div id="feedbackModal" aria-hidden="true">
  <div id="feedbackPanel" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
    <h2 id="feedbackTitle">Send Feedback</h2>
    <form id="feedbackForm">
      <label for="fbType">Type</label>
      <select id="fbType" required>
        <option value="bug_report">Bug Report</option>
        <option value="feature_request">Feature Request</option>
      </select>
      <label for="fbSummary">Title</label>
      <input id="fbSummary" maxlength="120" placeholder="Short summary" required />
      <label for="fbDescription">Description</label>
      <textarea id="fbDescription" maxlength="3000" placeholder="What happened? Steps to reproduce? Expected behavior?" required></textarea>
      <div id="feedbackActions">
        <button type="button" id="fbCancel">Cancel</button>
        <button type="submit">Submit</button>
      </div>
      <div id="feedbackStatus"></div>
    </form>
  </div>
</div>
<div id="feedbackToast" aria-live="polite"></div>
<script>
(()=>{
const c=document.getElementById('c'),ctx=c.getContext('2d'),msg=document.getElementById('msg'),left=document.getElementById('left'),right=document.getElementById('right');
const feedbackBtn=document.getElementById('feedbackBtn'),feedbackModal=document.getElementById('feedbackModal'),feedbackForm=document.getElementById('feedbackForm');
const fbType=document.getElementById('fbType'),fbSummary=document.getElementById('fbSummary'),fbDescription=document.getElementById('fbDescription'),fbCancel=document.getElementById('fbCancel');
const feedbackStatus=document.getElementById('feedbackStatus'),feedbackToast=document.getElementById('feedbackToast'),exportBtn=document.getElementById('exportBtn'),recordBtn=document.getElementById('recordBtn');
let t0=0,started=0,paused=0,aud=0,keys={};
const rnd=(a=1,b=0)=>Math.random()*(a-b)+b,cl=(v,a,b)=>v<a?a:v>b?b:v;
let DPR=1;
const BUILD='1.0.0-modem';
const FEEDBACK_RATE_MS=30000;
const MODEM_FEATURE_EMAIL='default-dimiglyd88@inbox.modem.dev';
const FORMSUBMIT_ENDPOINT=`https://formsubmit.co/ajax/${MODEM_FEATURE_EMAIL}`;
let feedbackOpen=0,feedbackBusy=0,feedbackPrevPaused=0,feedbackLastSubmit=0,toastTimer=0;
let REC=null,recShotT=0,sessionN=0;
const RECORD_PREF_KEY='galagaTribAutoVideo';
const VIDEO_REC={enabled:localStorage.getItem(RECORD_PREF_KEY)!=='0',active:0,rec:null,stream:null,chunks:[],mime:'',sessionId:'',file:''};
const PLAY_W=280,PLAY_H=360;
const VIS={shipW:36,shipH:28,enemyW:36,enemyH:28,gx:118,gy:66,playerBottom:92,beamLen:380};
const STAGE1_SCRIPT=[
 {t:4.6,type:'bee',c:1},{t:6.1,type:'bee',c:8},
 {t:8.2,type:'but',c:2},{t:9.8,type:'but',c:7},
 {t:12.4,type:'bee',c:0},{t:14.2,type:'bee',c:9},
 {t:17.3,type:'but',c:4},{t:20.4,type:'boss',c:3,escort:1},
 {t:24.1,type:'bee',c:5},{t:26.0,type:'but',c:6},
 {t:29.6,type:'boss',c:6,capture:1},
 {t:34.0,type:'bee',c:2},{t:37.2,type:'but',c:8},
 {t:41.0,type:'boss',c:4,escort:1}
];

const AC=()=>sfx.a||(sfx.a=new (window.AudioContext||webkitAudioContext)());
const sfx={
 a:null,n:null,
 play(f=440,d=.08,t='square',v=.03,sl=0,det=0,lpHz=4200,at=0){if(!aud)return;const A=AC(),tm=A.currentTime+at,o=A.createOscillator(),o2=A.createOscillator(),g=A.createGain(),lp=A.createBiquadFilter();
  lp.type='lowpass';lp.frequency.value=lpHz;g.gain.setValueAtTime(.0001,tm);g.gain.exponentialRampToValueAtTime(v,tm+.008);g.gain.exponentialRampToValueAtTime(.0001,tm+d);
  o.type=t;o.frequency.setValueAtTime(f,tm);o.frequency.linearRampToValueAtTime(Math.max(25,f+sl),tm+d);
  o2.type=t==='square'?'triangle':'square';o2.frequency.setValueAtTime(f*(1+det),tm);o2.frequency.linearRampToValueAtTime(Math.max(25,(f+sl)*(1+det)),tm+d);
  o.connect(lp);o2.connect(lp);lp.connect(g);g.connect(A.destination);o.start(tm);o2.start(tm);o.stop(tm+d+.03);o2.stop(tm+d+.03);
 },
 noise(d=.08,v=.02,hp=900,at=0){if(!aud)return;const A=AC(),tm=A.currentTime+at,b=this.n||(this.n=(()=>{const n=A.sampleRate*.35,buf=A.createBuffer(1,n,A.sampleRate),ch=buf.getChannelData(0);for(let i=0;i<n;i++)ch[i]=Math.random()*2-1;return buf})()),src=A.createBufferSource(),g=A.createGain(),f=A.createBiquadFilter();
  src.buffer=b;src.loop=true;f.type='highpass';f.frequency.value=hp;g.gain.setValueAtTime(v,tm);g.gain.exponentialRampToValueAtTime(.0001,tm+d);src.connect(f);f.connect(g);g.connect(A.destination);src.start(tm);src.stop(tm+d+.01);
 },
 seq(ns=[],step=.05,t='square',v=.02,sl=0,lpHz=3600){for(let i=0;i<ns.length;i++)if(ns[i]>0)this.play(ns[i],step,t,v,sl,0,lpHz,i*step*.92)},
 start(){this.seq([523,659,784],.055,'square',.02,24,3600);this.play(392,.18,'triangle',.018,110,.005,2500,.02)},
 shot(){this.play(980,.045,'square',.011,-520,.01,5200);this.play(1260,.03,'square',.007,-420,-.006,5600,.008);this.noise(.016,.0025,2800,.004)},
 enemyShot(){this.play(338,.075,'triangle',.009,-130,.002,3000);this.play(258,.05,'square',.004,-90,.002,2600,.012)},
 hit(){this.play(228,.05,'square',.013,-180,.008,3200);this.play(146,.1,'sawtooth',.015,-220,.012,2300,.02);this.noise(.05,.006,1600,.012)},
 boom(k='bee'){const boss=k==='boss'||k==='rogue';this.play(boss?190:252,.075,'sawtooth',boss?.026:.018,-240,.01,2300);this.play(boss?118:146,.16,'triangle',boss?.022:.014,-100,-.008,1700,.018);this.noise(boss?.12:.08,boss?.014:.009,900,.014)},
 beam(){this.play(92,.34,'sawtooth',.018,48,.018,3000);this.play(138,.28,'triangle',.009,30,.01,2400,.04);this.noise(.11,.004,1900,.03)},
 rescue(){this.seq([660,880,990,1320],.05,'triangle',.016,70,4300);this.play(1760,.08,'square',.007,-90,.003,5200,.08)},
 over(){this.seq([294,262,220,196],.11,'triangle',.017,-45,2300);this.play(147,.32,'sawtooth',.016,-120,.01,1900,.018);this.noise(.09,.004,1100,.1)},
 march(i=0){const p=[[392,523],[330,440],[440,587],[294,392]][i%4];this.play(p[0],.08,'triangle',.01,-10,.003,3000);this.play(p[1],.055,'square',.004,-20,-.003,4200,.012)}
};

const P={
 ship:[[0,0],[1,0],[2,0],[3,0],[-1,1],[0,1],[1,1],[2,1],[3,1],[4,1],[-2,2],[-1,2],[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[-1,3],[0,3],[1,3],[2,3],[3,3],[4,3],[0,4],[1,4],[2,4],[3,4]],
 bee:[[0,0],[1,0],[2,0],[3,0],[4,0],[-1,1],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[0,2],[1,2],[2,2],[3,2],[4,2],[1,3],[2,3],[3,3]],
 but:[[0,0],[1,0],[3,0],[4,0],[-1,1],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[0,2],[1,2],[2,2],[3,2],[4,2],[1,3],[2,3],[3,3]],
 boss:[[1,0],[2,0],[3,0],[0,1],[1,1],[2,1],[3,1],[4,1],[0,2],[1,2],[2,2],[3,2],[4,2],[1,3],[2,3],[3,3]],
 rogue:[[0,0],[1,0],[2,0],[3,0],[-1,1],[0,1],[1,1],[2,1],[3,1],[4,1],[-1,2],[0,2],[1,2],[2,2],[3,2],[4,2],[0,3],[1,3],[2,3],[3,3],[1,4],[2,4]]
};
const C={ship:'#7ed3ff',ship2:'#4da4f0',bee:'#ffd84a',but:'#ff7c49',boss:'#6df77f',boss2:'#ff6db0',rogue:'#ff7c9b'};

const S={score:0,best:+localStorage.galagaTribBest||0,lives:2,stage:1,shake:0,st:[],neb:[],e:[],pb:[],eb:[],fx:[],cap:null,banner:0,bannerTxt:'',fireCD:0,t:null,rogue:0,
 p:{x:0,y:0,s:470,cd:0,inv:0,dual:0,captured:0,pending:0,spawn:0,capBoss:null,capT:0},att:0,challenge:0,ch:{hits:0,total:0,done:0},seq:0,seqT:0,alertT:0,alertTxt:'',ultra:1,
 scriptMode:0,scriptT:0,scriptI:0,scriptShotI:0,scriptShotT:1.4};

const isChallengeStage=s=>s===3||((s-3)%4===0&&s>3);
const stageTune=(s,ch)=>ch?{shotCap:0,attackCap:0,diveRate:0,coolA:99,coolB:99,globalA:99,globalB:99,capChance:0,diveShotRate:0,aimMul:.08,aimClamp:10,aimRnd:1,bulletVy:170,bulletVyStage:2}
 :s<=1?{shotCap:1,attackCap:1,diveRate:.34,coolA:7.6,coolB:5.7,globalA:3.4,globalB:2.65,capChance:.11,diveShotRate:.24,aimMul:.08,aimClamp:11,aimRnd:1.4,bulletVy:154,bulletVyStage:2}
 :s===2?{shotCap:1,attackCap:2,diveRate:.72,coolA:5.6,coolB:3.6,globalA:1.9,globalB:1.35,capChance:.18,diveShotRate:.54,aimMul:.1,aimClamp:14,aimRnd:2,bulletVy:171,bulletVyStage:3}
 :s===3?{shotCap:2,attackCap:3,diveRate:.86,coolA:5.1,coolB:3.1,globalA:1.7,globalB:1.2,capChance:.22,diveShotRate:.62,aimMul:.12,aimClamp:16,aimRnd:2.3,bulletVy:176,bulletVyStage:4}
 :{shotCap:3,attackCap:2+(s>5)+(s>10),diveRate:1.02+s*.055,coolA:4.7,coolB:2.2,globalA:1.3,globalB:.9,capChance:.28,diveShotRate:.8,aimMul:.18,aimClamp:22,aimRnd:4,bulletVy:184,bulletVyStage:4};
const shotCap=()=>S.t?S.t.shotCap:0;
const recTime=()=>REC?+((performance.now()-REC.t0)/1000).toFixed(3):0;
const snapshot=()=>({started:!!started,paused:!!paused,stage:S.stage,score:S.score,lives:Math.max(0,S.lives+1),challenge:!!S.challenge,scriptMode:!!S.scriptMode,player:{x:+S.p.x.toFixed(2),y:+S.p.y.toFixed(2),dual:!!S.p.dual,captured:!!S.p.captured,pending:!!S.p.pending},counts:{enemies:S.e.filter(e=>e.hp>0).length,playerBullets:S.pb.length,enemyBullets:S.eb.length,effects:S.fx.length,attackers:S.att}});
const enemyRef=e=>e?{id:e.id,enemyType:e.t,column:e.c,row:e.r,dive:e.dive,carry:!!e.carry}:null;
function resetSession(reason='boot'){
 sessionN++;
 REC={id:`ngt-${Date.now()}-${sessionN}`,build:BUILD,reason,createdAt:new Date().toISOString(),url:location.href,viewport:{w:innerWidth,h:innerHeight,dpr:window.devicePixelRatio||1},userAgent:navigator.userAgent,events:[],snapshots:[]};
 REC.t0=performance.now();
 recShotT=0;
}
function logEvent(type,data={}){
 if(!REC)resetSession();
 REC.events.push(Object.assign({t:recTime(),type},data));
}
function logSnapshot(tag='tick'){
 if(!REC)resetSession();
 REC.snapshots.push(Object.assign({t:recTime(),tag},snapshot()));
}
function fireEnemyBullet(e,vx,vy,kind){
 S.eb.push({x:e.x,y:e.y+24,vx,vy});
 logEvent('enemy_bullet_fired',Object.assign({kind,x:+e.x.toFixed(2),y:+(e.y+24).toFixed(2),vx:+vx.toFixed(2),vy:+vy.toFixed(2)},enemyRef(e)));
 sfx.enemyShot();
}
function logEnemyAttackStart(e,mode,extra={}){
 logEvent('enemy_attack_start',Object.assign({mode,x:+e.x.toFixed(2),y:+e.y.toFixed(2)},enemyRef(e),extra));
}
function exportSession(){
 if(!REC)resetSession();
 logSnapshot('export');
 const out=JSON.stringify({session:Object.assign({},REC,{duration:recTime(),eventCount:REC.events.length,snapshotCount:REC.snapshots.length})},null,2);
 const file=`neo-galaga-session-${REC.id}.json`;
 const blob=new Blob([out],{type:'application/json'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url;a.download=file;a.click();
 setTimeout(()=>URL.revokeObjectURL(url),1000);
 showToast('Session log downloaded');
}
function downloadBlob(blob,file){
 const url=URL.createObjectURL(blob),a=document.createElement('a');
 a.href=url;a.download=file;a.click();
 setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function videoRecordSupported(){return !!(c.captureStream&&window.MediaRecorder);}
function pickVideoMime(){
 const list=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
 for(const m of list)if(!window.MediaRecorder||!MediaRecorder.isTypeSupported||MediaRecorder.isTypeSupported(m))return m;
 return '';
}
function syncRecordUi(){
 const supported=videoRecordSupported();
 recordBtn.disabled=!supported;
 recordBtn.classList.toggle('active',VIDEO_REC.enabled||VIDEO_REC.active);
 recordBtn.textContent=supported?(VIDEO_REC.active?'Recording Video...':`Auto Video: ${VIDEO_REC.enabled?'On':'Off'}`):'Auto Video: Unsupported';
}
function stopRunRecording(){
 if(!VIDEO_REC.active||!VIDEO_REC.rec)return;
 VIDEO_REC.active=0;
 const rec=VIDEO_REC.rec;
 VIDEO_REC.rec=null;
 try{rec.stop();}catch{}
 syncRecordUi();
}
function startRunRecording(){
 if(!VIDEO_REC.enabled||!videoRecordSupported())return;
 if(VIDEO_REC.active)stopRunRecording();
 VIDEO_REC.mime=pickVideoMime();
 VIDEO_REC.stream=c.captureStream(60);
 VIDEO_REC.chunks.length=0;
 VIDEO_REC.sessionId=REC?.id||`run-${Date.now()}`;
 VIDEO_REC.file=`neo-galaga-video-${VIDEO_REC.sessionId}.webm`;
 const rec=VIDEO_REC.mime?new MediaRecorder(VIDEO_REC.stream,{mimeType:VIDEO_REC.mime}):new MediaRecorder(VIDEO_REC.stream);
 rec.ondataavailable=e=>{if(e.data&&e.data.size)VIDEO_REC.chunks.push(e.data);};
 rec.onstop=()=>{
  const blob=new Blob(VIDEO_REC.chunks,{type:VIDEO_REC.mime||'video/webm'});
  if(VIDEO_REC.stream){for(const t of VIDEO_REC.stream.getTracks())t.stop();VIDEO_REC.stream=null;}
  VIDEO_REC.chunks.length=0;
  if(blob.size>0){downloadBlob(blob,VIDEO_REC.file);showToast('Run video downloaded');}
 };
 rec.start(1000);
 VIDEO_REC.rec=rec;
 VIDEO_REC.active=1;
 syncRecordUi();
}

function setFeedbackStatus(t='',err=0){
 feedbackStatus.textContent=t;
 feedbackStatus.className=err?'err':'';
}
function showToast(t){
 feedbackToast.textContent=t;
 feedbackToast.classList.add('show');
 clearTimeout(toastTimer);
 toastTimer=setTimeout(()=>feedbackToast.classList.remove('show'),1700);
}
function openFeedback(){
 if(feedbackOpen)return;
 feedbackPrevPaused=paused;paused=1;feedbackOpen=1;keys={};
 logEvent('feedback_open');
 feedbackModal.classList.add('open');
 feedbackModal.setAttribute('aria-hidden','false');
 feedbackBtn.setAttribute('aria-expanded','true');
 setFeedbackStatus('');
 setTimeout(()=>fbSummary.focus(),0);
}
function closeFeedback(force=0){
 if(!feedbackOpen||(!force&&feedbackBusy))return;
 feedbackOpen=0;paused=feedbackPrevPaused;
 logEvent('feedback_close',{force:!!force});
 feedbackModal.classList.remove('open');
 feedbackModal.setAttribute('aria-hidden','true');
 feedbackBtn.setAttribute('aria-expanded','false');
}
function openMailFallback(subject,lines){
 window.location.href=`mailto:${MODEM_FEATURE_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(lines.join('\n'))}`;
}
async function submitFeedback(ev){
 ev.preventDefault();
 if(feedbackBusy)return;
 const now=Date.now(),wait=FEEDBACK_RATE_MS-(now-feedbackLastSubmit);
 if(wait>0){setFeedbackStatus(`Please wait ${Math.ceil(wait/1000)}s before sending another report.`,1);return;}
 const type=fbType.value==='feature_request'?'feature_request':'bug_report';
 const title=fbSummary.value.trim().replace(/\s+/g,' ');
 const description=fbDescription.value.trim();
 if(title.length<4){setFeedbackStatus('Title must be at least 4 characters.',1);return;}
 if(description.length<10){setFeedbackStatus('Description must be at least 10 characters.',1);return;}
 feedbackBusy=1;
 setFeedbackStatus('Sending feedback...');
  const payload={
  type,title,description,
  timestamp:new Date(now).toISOString(),
  game:{name:'Neo Galaga Tribute',version:BUILD,url:location.href,user_agent:navigator.userAgent,language:navigator.language},
  game_state:{stage:S.stage,score:S.score,lives:Math.max(0,S.lives+1),started:!!started,paused:!!paused,challenge:!!S.challenge}
 };
 const kind=type==='feature_request'?'Feature Request':'Bug Report';
 const subject=`[${kind}] ${title}`;
 const lines=[
  description,'',
  '---',
  `Type: ${kind}`,
  `Build: ${BUILD}`,
  `Timestamp: ${payload.timestamp}`,
  `URL: ${location.href}`,
  `Stage: ${S.stage}`,
  `Score: ${S.score}`,
  `Lives: ${Math.max(0,S.lives+1)}`,
  `Started: ${started?1:0}`,
  `Paused: ${paused?1:0}`,
  `Challenge: ${S.challenge?1:0}`,
  `User-Agent: ${navigator.userAgent}`
 ];
 try{
  const r=await fetch(FORMSUBMIT_ENDPOINT,{
   method:'POST',
   headers:{'Content-Type':'application/json','Accept':'application/json'},
   body:JSON.stringify({
    _subject:subject,
    _template:'table',
    product:'Neo Galaga Tribute',
    type:kind,
    title,
    description,
    build:BUILD,
    timestamp:payload.timestamp,
    url:location.href,
    stage:S.stage,
    score:S.score,
    lives:Math.max(0,S.lives+1),
    started:started?1:0,
    paused:paused?1:0,
    challenge:S.challenge?1:0,
    user_agent:navigator.userAgent,
    message:lines.join('\n')
   })
  });
  const data=await r.json().catch(()=>null);
  if(!r.ok||data?.success===false)throw new Error(data?.message||`HTTP ${r.status}`);
  feedbackLastSubmit=now;
  fbType.value='bug_report';fbSummary.value='';fbDescription.value='';
  setFeedbackStatus('Sent to Modem inbox.');
  showToast('Feedback sent');
  setTimeout(()=>closeFeedback(),220);
 }catch(err){

function assignEscorts(boss){

 boss.esc=0;
 for(const [i,e] of cand.entries()){e.dive=5;e.lead=boss.id;e.off=(i?1:-1)*64;e.shot=1;boss.esc++;logEnemyAttackStart(e,'escort',{lead:boss.id,offset:e.off});}
}

function pickScriptEnemy(type,c){

 e.dive=1;e.vx=(p.x-e.x)*.56+rnd(26,-26);e.vy=92+rnd(12);e.shot=e.t==='boss'?2:1;

function runStage1Script(dt,p,T){

  if(S.stage===1&&S.att>=1)break;

 }

 if(S.scriptShotT<=0&&S.eb.length<shotCap()){

 if(cand){const aim=cl((p.x-cand.x)*T.aimMul,-T.aimClamp,T.aimClamp);fireEnemyBullet(cand,aim,T.bulletVy+S.stage*T.bulletVyStage,'script');}

function updateChallengeEnemy(e,dt){
 if(e.spawn>0){e.spawn-=dt;return}
 e.tm+=dt*(1.26+S.stage*.02);
 const u=e.tm,p=e.ph;
 const lane=(e.c-4.5)/4.5;
 e.x=PLAY_W/2+Math.sin(u*2.1+p)*(PLAY_W*.24)*(1-Math.min(.45,u*.05))+lane*36+Math.sin(u*6+p)*8;
 e.y=-110+u*220+Math.cos(u*2.7+p)*30;
 if(e.y>PLAY_H+30){e.hp=0;e.miss=1;}
}

function updateEnemy(e,dt,t,T,p){
 if(e.hp<=0)return;
 const tx=e.tx+Math.sin(t*.92+e.r*.45)*52,ty=e.ty+Math.sin(t*1.35+e.c*.55)*9;
 if(!e.form){
  if(e.spawn>0){e.spawn-=dt;return}
  const stage1=S.stage===1&&!S.challenge;
  e.en+=dt*(stage1?1.02:1.35);
  const k=Math.max(0,1-e.en*(stage1?0.35:0.42));
  const sx=tx+Math.sin(e.en*(stage1?5.6:5)+e.ph)*(stage1?170:150)*k;
  const sy=ty+Math.cos(e.en*(stage1?4.5:4)+e.ph)*(stage1?58:48)*k;
  e.x+=(sx-e.x)*Math.min(1,dt*(stage1?3.1:3.6));e.y+=(sy-e.y)*Math.min(1,dt*(stage1?3:3.4));if(e.en>(stage1?2.9:2.4))e.form=1;return;
 }
 if(e.dive===5){
  S.att++;const l=S.e.find(q=>q.id===e.lead&&q.hp>0&&(q.dive===1||q.dive===4||q.dive===2));
  if(!l){e.dive=1;e.lead=null;e.vx=rnd(26,-26);e.vy=104;return}
  e.x+=(l.x+e.off-e.x)*Math.min(1,dt*6.2);e.y+=(l.y-34-e.y)*Math.min(1,dt*6);
  if(!S.challenge&&e.shot>0&&S.eb.length<shotCap()&&Math.random()<dt*T.diveShotRate*.55){const aim=cl((p.x-e.x)*T.aimMul,-T.aimClamp,T.aimClamp)+rnd(T.aimRnd,-T.aimRnd);fireEnemyBullet(e,aim,T.bulletVy+S.stage*T.bulletVyStage,'escort');e.shot--;}
  return;
 }
 if(e.dive===2){
  S.att++;e.x+=Math.sin(t*7+e.ph)*8*dt;e.beamT-=dt;
  if(e.beam&&canCapture()&&Math.abs(p.x-e.x)<8&&p.y>e.y+12&&p.y<e.y+VIS.beamLen)capturePlayer(e);
  if(e.beamT<=0){e.beam=0;e.dive=1;e.vx=rnd(28,-28);e.vy=112;e.shot=1;e.esc=0}
  return;
 }
 if(e.dive===4){
  S.att++;e.x+=(e.targetX-e.x)*Math.min(1,dt*3.2);e.y+=e.vy*dt;
  if(e.y>=e.targetY){e.y=e.targetY;e.vx=e.vy=0;e.dive=2;e.beam=1;e.beamT=1.85}
  return;
 }
 if(e.dive===1){
  S.att++;e.vy+=172*dt;e.x+=e.vx*dt+Math.sin(e.tm*7+e.ph)*13*dt;e.y+=e.vy*dt;
  if(!S.challenge&&e.shot>0&&S.eb.length<shotCap()&&e.y>108&&e.y<p.y-88&&Math.random()<dt*T.diveShotRate){const aim=cl((p.x-e.x)*T.aimMul,-T.aimClamp,T.aimClamp)+rnd(T.aimRnd,-T.aimRnd);fireEnemyBullet(e,aim,T.bulletVy+S.stage*T.bulletVyStage,'dive');e.shot--;}
  if(e.y>PLAY_H+30){e.x=tx;e.y=-26;e.vx=e.vy=0;e.dive=3;e.beam=0;e.esc=0}
  return;
 }
 if(e.dive===3){e.x+=(tx-e.x)*Math.min(1,dt*3.4);e.y+=(ty-e.y)*Math.min(1,dt*3.5);if(Math.hypot(tx-e.x,ty-e.y)<5){e.dive=0;e.vx=e.vy=0;e.esc=0}return}
 e.x+=(tx-e.x)*Math.min(1,dt*6);e.y+=(ty-e.y)*Math.min(1,dt*6);e.cool-=dt;
 if(S.scriptMode)return;
 if(e.cool<=0&&Math.random()<dt*T.diveRate&&S.att<T.attackCap){
  e.cool=rnd(T.coolA,T.coolB)-S.stage*.02;
  if(e.t==='boss'&&canCapture()&&Math.random()<T.capChance){e.dive=4;e.targetX=cl(p.x+rnd(34,-34),26,PLAY_W-26);e.targetY=138;e.vx=0;e.vy=128;e.shot=0;e.esc=0;logEnemyAttackStart(e,'capture',{targetX:+e.targetX.toFixed(2),targetY:e.targetY,scripted:0});}
  else{e.dive=1;e.vx=(p.x-e.x)*.56+rnd(38,-38);e.vy=94+rnd(20);e.shot=e.t==='boss'?2:1;logEnemyAttackStart(e,'dive',{targetX:+p.x.toFixed(2),scripted:0});if(e.t==='boss')assignEscorts(e)}
 }
}

function update(dt){
 if(!started||paused)return;
 recShotT-=dt;
 if(recShotT<=0){logSnapshot('tick');recShotT=.5;}
 S.shake=Math.max(0,S.shake-dt);S.alertT=Math.max(0,S.alertT-dt);
 const p=S.p;S.t=stageTune(S.stage,S.challenge);const T=S.t;
 for(const s of S.st){s.tw+=dt*(1.6+s.z*.9);s.y+=(14+s.z*22+S.stage*.5)*dt;if(s.y>PLAY_H+4){s.y=-4;s.x=rnd(PLAY_W)}}

 if(p.captured&&p.capBoss&&p.capBoss.hp>0){p.capT-=dt;p.x+=(p.capBoss.x-p.x)*Math.min(1,dt*4.6);p.y+=(p.capBoss.y+22-p.y)*Math.min(1,dt*4.4);if(p.capT<=0||Math.hypot(p.x-p.capBoss.x,p.y-(p.capBoss.y+22))<8)finishCapture();}
 else if(p.captured){p.captured=0;p.capBoss=null;p.inv=1.2;}
 if(p.spawn<=0&&p.pending){p.pending=0;p.x=PLAY_W/2;p.y=PLAY_H-VIS.playerBottom}
 if(p.spawn<=0&&!p.captured){const hp=playerHitbox();p.x=cl(p.x+(((keys.ArrowRight||keys.KeyD)?1:0)-((keys.ArrowLeft||keys.KeyA)?1:0))*p.s*dt,hp.w+2,PLAY_W-hp.w-2);}
 if(keys.Space)shoot();

 const alive=S.e.filter(e=>e.hp>0);
 if(!alive.length&&!S.challenge){logEvent('stage_clear',{stage:S.stage,score:S.score});S.stage++;spawnStage();sfx.start();return}
 if(S.challenge&&!alive.length&&!S.ch.done){logEvent('challenge_clear',{stage:S.stage,hits:S.ch.hits,total:S.ch.total});S.ch.done=1;const perfect=S.ch.hits===S.ch.total?10000:0;S.score+=perfect;S.bannerTxt=perfect?('PERFECT '+perfect):('HITS '+S.ch.hits+'/'+S.ch.total);S.banner=2.8;S.stage++;setTimeout(()=>{if(started)spawnStage()},900);}

 const t=performance.now()/1000;S.seqT-=dt;if(S.seqT<=0&&!S.challenge){S.seqT=.38;sfx.march(S.seq++)}
 S.att=0;
 for(const e of S.e){e.tm+=dt;if(e.hp<=0)continue;if(S.challenge)updateChallengeEnemy(e,dt);else updateEnemy(e,dt,t,T,p)}
 runStage1Script(dt,p,T);

 if(!S.challenge&&!S.scriptMode&&S.fireCD<=0&&S.eb.length<shotCap()){
  const bottoms={};for(const e of S.e)if(e.hp>0&&e.form&&!e.dive&&!e.ch){if(!bottoms[e.c]||e.y>bottoms[e.c].y)bottoms[e.c]=e}
  const list=Object.values(bottoms);
  if(list.length){const q=list[(Math.random()*list.length)|0];fireEnemyBullet(q,rnd(2,-2),154+S.stage*4,'formation');S.fireCD=rnd(T.globalA,T.globalB)-Math.min(.1,S.stage*.004)}else S.fireCD=.25;
 }

 for(let i=S.pb.length-1;i>=0;i--){const b=S.pb[i];b.y-=b.v*dt;if(b.y<-30){S.pb.splice(i,1);continue}
  for(const e of S.e){if(e.hp<=0)continue;const h=enemyHitbox(e);if(Math.abs(b.x-e.x)<h.w&&Math.abs(b.y-e.y)<h.h){S.pb.splice(i,1);e.hp--;if(e.hp<=0){awardKill(e,e.dive);ex(e.x,e.y,16,e.t==='boss'?'#ff8cd7':e.t==='but'?'#ffb55f':e.t==='rogue'?'#ffa4c0':'#ffe563');sfx.boom(e.t);}else sfx.hit();break}}
 }

 for(let i=S.eb.length-1;i>=0;i--){const b=S.eb[i];b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y>PLAY_H+30||b.x<-30||b.x>PLAY_W+30){S.eb.splice(i,1);continue}
  if(!S.challenge&&p.spawn<=0&&!p.captured){const h=playerHitbox();if(Math.abs(b.x-p.x)<h.w&&Math.abs(b.y-p.y)<h.h){S.eb.splice(i,1);loseShip();}}}

 if(!S.challenge){for(const e of S.e){if(e.hp<=0||p.spawn>0||p.captured)continue;const he=enemyHitbox(e),hp=playerHitbox();if(Math.abs(e.x-p.x)<he.w+hp.w&&Math.abs(e.y-p.y)<he.h+hp.h){e.hp=0;ex(e.x,e.y,12,'#fff');loseShip();}}}

 if(S.cap){S.cap.y+=S.cap.vy*dt;S.cap.t-=dt;if(S.cap.t<=0||S.cap.y>PLAY_H+30)S.cap=null;else if(Math.abs(S.cap.x-p.x)<12&&Math.abs(S.cap.y-p.y)<10&&!p.captured&&p.spawn<=0){S.cap=null;p.dual=1;S.score+=1000;sfx.rescue()}}
 for(let i=S.fx.length-1;i>=0;i--){const f=S.fx[i];f.t-=dt;f.x+=f.vx*dt;f.y+=f.vy*dt;f.vx*=.985;f.vy*=.985;if(f.t<=0)S.fx.splice(i,1)}
}

function enemyDims(e){
 if(e.t==='boss')return{w:38,h:30};
 if(e.t==='but')return{w:34,h:27};
 if(e.t==='rogue')return{w:35,h:28};
 return{w:32,h:26};
}
function enemyHitbox(e){
 const d=enemyDims(e),stage1=e&&!S.challenge&&S.stage===1,scale=stage1?(e&&!e.form?0.08:(S.scriptMode?0.18:0.22)):0.22;
 return{w:d.w*scale,h:d.h*scale};
}
function playerHitbox(){return{w:7,h:6};}
function drawMiniShip(s=1,colA='#9adfff',colB='#72c8ff'){
 const ps=3*s;drawPix(-ps*1.6,-ps*2,ps,P.ship,colA,colB);
}
function drawEnemy(e){
 const ps=3;
 ctx.save();ctx.translate(e.x,e.y);if(e.dive===1||e.dive===4)ctx.rotate(Math.atan2(e.vy,e.vx||1)+1.57);
 if(e.t==='bee')drawPix(-ps*1.5,-ps*2,ps,P.bee,'#ffcf3b','#2f78ff');
 else if(e.t==='but')drawPix(-ps*1.5,-ps*2,ps,P.but,'#ff2f43','#59a1ff');
 else if(e.t==='rogue')drawPix(-ps*1.5,-ps*2,ps,P.rogue,'#ff5ca2','#70b7ff');
 else drawPix(-ps*1.5,-ps*2,ps,P.boss,'#52f07a',e.hp>1?'#b65bff':'#4a8cff');
 if(e.beam){
  const len=VIS.beamLen,bw=10;
  const g=ctx.createLinearGradient(0,0,0,len);g.addColorStop(0,'rgba(136,245,255,.92)');g.addColorStop(1,'rgba(136,245,255,.03)');
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(-bw,12);ctx.lineTo(bw,12);ctx.lineTo(bw*2.2,len);ctx.lineTo(-bw*2.2,len);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(220,250,255,.22)';ctx.fillRect(-3,12,6,len);
 }
 if(e.carry){ctx.save();ctx.translate(0,20);drawMiniShip(1.1,'#d8f2ff','#ff3e4f');ctx.restore();}
 ctx.restore();
}
function drawPlayerBody(x,y,dual=0,ghost=0){
 const ps=3;
 ctx.save();ctx.translate(x,y);if(ghost)ctx.globalAlpha=.52;
 drawPix(-ps*1.6,-ps*2.2,ps,P.ship,'#f4f8ff','#ff3347');
 if(dual){drawPix(-ps*4.2,-ps*1.9,ps*0.82,P.ship,'#f4f8ff','#ff3347');drawPix(ps*0.95,-ps*1.9,ps*0.82,P.ship,'#f4f8ff','#ff3347');}
 ctx.restore();
}

function drawBadges(stage){const vals=[50,30,20,10,5,1],col=['#f3cf65','#f0b35e','#ef9559','#ec7755','#e95b51','#e53f4e'];let x=PLAY_W-8,y=PLAY_H-8;
 for(let i=0;i<vals.length;i++)while(stage>=vals[i]){stage-=vals[i];ctx.fillStyle=col[i];ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-3,y-5);ctx.lineTo(x+3,y-5);ctx.closePath();ctx.fill();x-=6;if(x<PLAY_W-66){x=PLAY_W-8;y-=8;}}
}

function drawPostFx(){}

function draw(){
 const sh=S.shake*8,dx=rnd(sh,-sh),dy=rnd(sh,-sh);
 const fit=Math.max(1,Math.floor(Math.min(innerWidth/PLAY_W,innerHeight/PLAY_H)));
 const scale=S.ultra?fit:Math.max(1,fit-1);
 const viewW=PLAY_W*scale,viewH=PLAY_H*scale;
 const ox=Math.floor((innerWidth-viewW)/2),oy=Math.floor((innerHeight-viewH)/2);
 ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,c.width,c.height);
 ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);
 ctx.setTransform(DPR*scale,0,0,DPR*scale,(ox+dx*.25)*DPR,(oy+dy*.25)*DPR);
 ctx.fillStyle='#000';ctx.fillRect(0,0,PLAY_W,PLAY_H);
 ctx.save();ctx.beginPath();ctx.rect(0,0,PLAY_W,PLAY_H);ctx.clip();
 for(const s of S.st){ctx.globalAlpha=.2+s.z*.8*(.35+Math.sin(s.tw)*.65);ctx.fillStyle=s.c;ctx.fillRect(s.x,s.y,s.s,s.s)}ctx.globalAlpha=1;
 for(const f of S.fx){ctx.globalAlpha=Math.max(0,f.t*2);ctx.fillStyle=f.c;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,7);ctx.fill()}ctx.globalAlpha=1;
 if(S.cap){ctx.save();ctx.translate(S.cap.x,S.cap.y);drawMiniShip(1.25,'#f4f8ff','#ff3347');ctx.restore();}
 for(const b of S.pb){ctx.fillStyle='#e9f8ff';ctx.fillRect(b.x-1,b.y-16,2,18)}
 for(const b of S.eb){ctx.fillStyle='#ff5e5e';ctx.fillRect(b.x-1,b.y-10,2,13)}
 for(const e of S.e)if(e.hp>0)drawEnemy(e);
 const p=S.p;if((!p.pending||p.spawn<=.3)&&!p.spawn){if(!(p.inv>0&&Math.floor(p.inv*14)%2))drawPlayerBody(p.x,p.y,p.dual,0)}
 if(p.captured)drawPlayerBody(p.x,p.y,0,1);
 drawPostFx();
 ctx.restore();
 ctx.setTransform(1,0,0,1,0,0);
 left.innerHTML=`<span style=\"color:#ff2d2d\">1UP</span> ${S.score.toString().padStart(6,'0')}   <span style=\"color:#ff2d2d\">HIGH SCORE</span> ${String(S.best).padStart(6,'0')}   STAGE ${S.stage}`;
 right.textContent=`SHIPS ${Math.max(0,S.lives+1)}${S.ultra?'  U':''}${document.fullscreenElement?'  F':''}${VIDEO_REC.active?'  REC':''}`;
 const toolsVisible=!started||paused||feedbackOpen;
 feedbackBtn.style.display=toolsVisible?'block':'none';
 exportBtn.style.display=toolsVisible?'block':'none';
 recordBtn.style.display=toolsVisible?'block':'none';
 if(!started)msg.innerHTML='PRESS <span class=\"k\">ENTER</span> TO START\n<span class=\"k\">F</span> FULLSCREEN   <span class=\"k\">U</span> ULTRA SCALE';
 else if(paused)msg.innerHTML='PAUSED\n\nPress <span class="k">P</span> to resume';
 else if(S.alertT>0)msg.textContent=S.alertTxt;
 else if(S.banner>0)msg.textContent=S.bannerTxt;
 else msg.textContent='';
}

function loop(ts){const dt=Math.min(.033,(ts-t0)/1000||0);t0=ts;update(dt);draw();requestAnimationFrame(loop)}
resetSession();
logEvent('boot');
logSnapshot('boot');
syncRecordUi();
rs();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
