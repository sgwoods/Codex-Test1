<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#120F1A"/>
      <stop offset="1" stop-color="#1C1531"/>
    </linearGradient>
    <linearGradient id="gAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D6A2FF"/>
      <stop offset="1" stop-color="#7460FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#gBg)"/>
  <rect x="40" y="40" width="1120" height="680" rx="28" fill="#141225" stroke="#9D8CFF" stroke-width="2"/>
  <text x="80" y="122" fill="#F5F0FF" font-size="56" font-family="Menlo, Monaco, monospace" font-weight="700">Galaxy Guardians</text>
  <text x="80" y="168" fill="#D9C7FF" font-size="28" font-family="Menlo, Monaco, monospace">Future Platinum game pack</text>

  <rect x="80" y="216" width="490" height="180" rx="24" fill="#1A1730" stroke="#9D8CFF" stroke-width="2"/>
  <text x="112" y="268" fill="#E9DEFF" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">Project identity</text>
  <text x="112" y="314" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">Galaxian-inspired sibling game for Platinum.</text>
  <text x="112" y="346" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">Separate planning identity from Galaxian the</text>
  <text x="112" y="378" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">reference lineage and from Aurora’s mechanics.</text>

  <rect x="610" y="216" width="510" height="180" rx="24" fill="#1A1730" stroke="#9D8CFF" stroke-width="2"/>
  <text x="642" y="268" fill="#E9DEFF" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">First intended slice</text>
  <text x="642" y="314" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">formation rack, independent dives,</text>
  <text x="642" y="346" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">flagship/escort scoring, single-shot pressure,</text>
  <text x="642" y="378" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">wrap-around threat, no Aurora capture/rescue.</text>

  <rect x="80" y="438" width="1040" height="224" rx="24" fill="#16142A" stroke="#B38BFF" stroke-width="2"/>
  <text x="112" y="492" fill="#E9DEFF" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">Current role on Platinum</text>
  <text x="112" y="540" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">Right now Galaxy Guardians is a shell preview and coming-soon splash, not a playable pack.</text>
  <text x="112" y="574" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">The right next step is to start gameplay only after Aurora’s Platinum rerelease baseline</text>
  <text x="112" y="608" fill="#F4EDFF" font-size="22" font-family="Menlo, Monaco, monospace">is trusted and the platform/game seam remains clear.</text>

  <rect x="80" y="690" width="332" height="18" rx="9" fill="url(#gAccent)"/>
</svg>
