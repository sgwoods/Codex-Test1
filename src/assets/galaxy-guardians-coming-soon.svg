    <g transform="translate(238 266) scale(.46)">
      <path d="M0 -70 22 -26 0 56 -22 -26Z" fill="url(#metal)"/>
      <path d="M-108 -6 -18 -18 -6 0 -18 18Z" fill="url(#blueWing)"/>
      <path d="M108 -6 18 -18 6 0 18 18Z" fill="url(#blueWing)"/>
      <path d="M-36 18 -10 0 0 20 -26 34Z" fill="url(#redTrim)"/>
      <path d="M36 18 10 0 0 20 26 34Z" fill="url(#redTrim)"/>
      <rect x="-8" y="-36" width="16" height="28" rx="5" fill="#ffd76b"/>
    </g>
    <g transform="translate(944 246) scale(.34)">
      <path d="M0 -70 22 -26 0 56 -22 -26Z" fill="url(#metal)"/>
      <path d="M-108 -6 -18 -18 -6 0 -18 18Z" fill="url(#blueWing)"/>
      <path d="M108 -6 18 -18 6 0 18 18Z" fill="url(#blueWing)"/>
      <path d="M-36 18 -10 0 0 20 -26 34Z" fill="url(#redTrim)"/>
      <path d="M36 18 10 0 0 20 26 34Z" fill="url(#redTrim)"/>
      <rect x="-8" y="-36" width="16" height="28" rx="5" fill="#ffd76b"/>
    </g>
  </g>

  <g transform="translate(600 356)" filter="url(#softGlow)">
    <ellipse cx="0" cy="18" rx="208" ry="62" fill="#6ce1ff" fill-opacity=".10"/>
    <ellipse cx="0" cy="18" rx="152" ry="46" fill="#ffb667" fill-opacity=".08"/>
  </g>

  <g transform="translate(600 346)">
    <path d="M0 -148 30 -58 16 -8 0 126 -16 -8 -30 -58Z" fill="url(#metal)" stroke="#d9f4ff" stroke-opacity=".32"/>
    <path d="M-194 -2 -54 -28 -22 -6 -54 26Z" fill="url(#blueWing)" stroke="#abecff" stroke-opacity=".28"/>
    <path d="M194 -2 54 -28 22 -6 54 26Z" fill="url(#blueWing)" stroke="#abecff" stroke-opacity=".28"/>
    <path d="M-136 -54 -28 -26 -18 -2 -86 34 -176 20Z" fill="#f7fbff" fill-opacity=".97"/>
    <path d="M136 -54 28 -26 18 -2 86 34 176 20Z" fill="#f7fbff" fill-opacity=".97"/>
    <path d="M-72 42 -18 0 0 36 -56 78 -114 68Z" fill="url(#redTrim)"/>
