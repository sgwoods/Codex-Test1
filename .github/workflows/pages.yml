name: Deploy Legacy Redirect

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build redirect artifact
        run: |
          mkdir -p _site/beta
          cp index.html _site/
          cp release-dashboard.html _site/
          cp project-guide.html _site/
          cp 404.html _site/
          cp README.md _site/
          cp beta/index.html _site/beta/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
