<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Galaxy Guardians coming soon preview art</title>
  <desc id="desc">A Galaxian-inspired promo card showing a classic-style starfighter over a retro starfield for the Platinum platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b18"/>
      <stop offset="38%" stop-color="#101a31"/>
      <stop offset="72%" stop-color="#2b1118"/>
      <stop offset="100%" stop-color="#14080e"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7ce4ff" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#7ce4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffb260" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#ffb260" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8de8ff" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#ffe0a2" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#32200d"/>
      <stop offset="100%" stop-color="#6a4314"/>
    </linearGradient>
    <linearGradient id="titleGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee0ff"/>
      <stop offset="100%" stop-color="#ffbe72"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="50%" stop-color="#cfe5ff"/>
      <stop offset="100%" stop-color="#86a8da"/>
    </linearGradient>
    <linearGradient id="blueWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92ebff"/>
      <stop offset="100%" stop-color="#286dd0"/>
    </linearGradient>
    <linearGradient id="redTrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcf67"/>
      <stop offset="100%" stop-color="#ff6646"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity=".18">
    <circle cx="148" cy="128" r="116" fill="url(#glowBlue)"/>
    <circle cx="1046" cy="118" r="150" fill="url(#glowAmber)"/>
    <circle cx="196" cy="622" r="122" fill="url(#glowAmber)"/>
    <circle cx="1000" cy="618" r="134" fill="url(#glowBlue)"/>
  </g>
  <g opacity=".09">
