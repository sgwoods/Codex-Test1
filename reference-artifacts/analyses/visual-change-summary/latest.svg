<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1040" viewBox="0 0 1440 1040"><style>text{font-family:Inter,Arial,sans-serif;fill:#eaf7ff}.small{font-size:24px;fill:#b9d8ee}.tiny{font-size:19px;fill:#9dc4df}.title{font-size:42px;font-weight:800}.metric{font-size:31px;font-weight:800;fill:#7fffd0}.panel{fill:#0d1b2a;stroke:#35536b;stroke-width:2}.chip{fill:#112b3a;stroke:#3c6c80;stroke-width:2}.label{font-size:26px;font-weight:800}.mono{font-family:Menlo,monospace;font-size:22px;fill:#d8ecff}</style><rect width="1440" height="1040" fill="#06111d"/><text class="title" x="42" y="62">Aurora Conformance Pass: What Changed Visually</text><text class="small" x="42" y="104">Current branch: reference-pixel sprite lane + late-challenge identity scoring. Runtime promotion is still gated.</text><rect class="panel" x="40" y="136" width="1360" height="174" rx="18"/><text class="label" x="70" y="180">Step 2: Late challenge identity gates</text><text class="small" x="70" y="222">Stage 19 and Stage 27 candidate sweeps now block lookalike candidates whose best match is an earlier Galaga challenge.</text><text class="mono" x="70" y="266">Stage 19: best match challenge-3 vs expected challenge-5 - blocked, penalty 1.34</text><text class="mono" x="744" y="266">Stage 27: best match challenge-1 vs expected challenge-7 - blocked, penalty 2.31</text><rect class="panel" x="40" y="340" width="1360" height="620" rx="18"/><text class="label" x="70" y="386">Step 3: Target-lane sprite alignment</text><text class="metric" x="70" y="430">Runtime-vs-target crop score: 5.48 -> 6.18/10</text><text class="small" x="520" y="430">Conformance render lane is now explicitly measured in reference-pixel-lab mode.</text><text class="tiny" x="380" y="474">Galaga target</text><text class="tiny" x="618" y="474">Aurora current</text><text class="tiny" x="844" y="474">Measured result and read</text><text class="label" x="70" y="557">Bee / Zako</text><rect class="chip" x="340" y="505" width="190" height="84" rx="10"/><rect class="chip" x="578" y="505" width="190" height="84" rx="10"/><image href="data:image/png;base64," x="358" y="515" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><image href="data:image/png;base64," x="596" y="515" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><text class="metric" x="844" y="536">7.75/10 target-crop</text><text class="tiny" x="844" y="571">Formation silhouette now matches accepted target much more closely.</text><text class="label" x="70" y="662">Butterfly / Goei</text><rect class="chip" x="340" y="610" width="190" height="84" rx="10"/><rect class="chip" x="578" y="610" width="190" height="84" rx="10"/><image href="data:image/png;base64," x="358" y="620" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><image href="data:image/png;base64," x="596" y="620" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><text class="metric" x="844" y="641">8.16/10 target-crop</text><text class="tiny" x="844" y="676">Best sprite gain in this pass; current crop is strongly target-like.</text><text class="label" x="70" y="767">Challenge green family</text><rect class="chip" x="340" y="715" width="190" height="84" rx="10"/><rect class="chip" x="578" y="715" width="190" height="84" rx="10"/><image href="data:image/png;base64," x="358" y="725" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><image href="data:image/png;base64," x="596" y="725" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><text class="metric" x="844" y="746">4.58/10 target-crop</text><text class="tiny" x="844" y="781">Improved from very weak, but target crop itself still looks contaminated/partial.</text><text class="label" x="70" y="872">Challenge yellow family</text><rect class="chip" x="340" y="820" width="190" height="84" rx="10"/><rect class="chip" x="578" y="820" width="190" height="84" rx="10"/><image href="data:image/png;base64," x="358" y="830" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><image href="data:image/png;base64," x="596" y="830" width="154" height="64" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated"/><text class="metric" x="844" y="851">4.04/10 target-crop</text><text class="tiny" x="844" y="886">Improved, but still the weakest current target-crop comparison.</text><text class="tiny" x="70" y="1006">Remaining gap: challenge stage set-piece movement and specialty target authority. Sprite rows improved, but challenge-stage gameplay score remains 4.3/10.</text></svg>