    <text x="1194" y="520" fill="#F3ECFF" font-size="24" font-family="Menlo, Monaco, monospace" font-weight="700">Next: Guardians prep</text>
    <text x="1164" y="556" fill="#D9C8F4" font-size="20" font-family="Menlo, Monaco, monospace">Second playable pack after baseline</text>
