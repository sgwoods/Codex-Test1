<svg width="1600" height="940" viewBox="0 0 1600 940" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1600" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08101B"/>
      <stop offset="1" stop-color="#131D32"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="940" fill="url(#bg3)"/>
  <text x="88" y="92" fill="#F3F8FF" font-size="50" font-family="Menlo, Monaco, monospace" font-weight="700">Platinum Migration State</text>
  <text x="88" y="136" fill="#A7B7D8" font-size="24" font-family="Menlo, Monaco, monospace">Where the platform effort stands today and what comes next.</text>

  <line x1="188" y1="420" x2="1412" y2="420" stroke="#31537F" stroke-width="10" stroke-linecap="round"/>

  <g>
    <circle cx="250" cy="420" r="54" fill="#17304F" stroke="#58D6FF" stroke-width="6"/>
    <text x="226" y="432" fill="#8BE8FF" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">1</text>
    <text x="146" y="520" fill="#EAF3FF" font-size="24" font-family="Menlo, Monaco, monospace" font-weight="700">Platform named</text>
    <text x="112" y="556" fill="#BFD0EE" font-size="20" font-family="Menlo, Monaco, monospace">Platinum is explicit in docs</text>
  </g>

  <g>
    <circle cx="520" cy="420" r="54" fill="#17304F" stroke="#58D6FF" stroke-width="6"/>
    <text x="496" y="432" fill="#8BE8FF" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">2</text>
    <text x="394" y="520" fill="#EAF3FF" font-size="24" font-family="Menlo, Monaco, monospace" font-weight="700">Aurora on Platinum</text>
    <text x="370" y="556" fill="#BFD0EE" font-size="20" font-family="Menlo, Monaco, monospace">Dev-playable and pack-hosted</text>
  </g>

  <g>
    <circle cx="790" cy="420" r="54" fill="#17304F" stroke="#58D6FF" stroke-width="6"/>
    <text x="766" y="432" fill="#8BE8FF" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">3</text>
    <text x="654" y="520" fill="#EAF3FF" font-size="24" font-family="Menlo, Monaco, monospace" font-weight="700">Shell framed</text>
    <text x="616" y="556" fill="#BFD0EE" font-size="20" font-family="Menlo, Monaco, monospace">Platinum splash and picker exist</text>
  </g>

  <g>
    <circle cx="1060" cy="420" r="54" fill="#17304F" stroke="#58D6FF" stroke-width="6"/>
    <text x="1036" y="432" fill="#8BE8FF" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">4</text>
    <text x="906" y="520" fill="#EAF3FF" font-size="24" font-family="Menlo, Monaco, monospace" font-weight="700">Rerelease hardening</text>
    <text x="874" y="556" fill="#BFD0EE" font-size="20" font-family="Menlo, Monaco, monospace">Harness gates and docs refreshed</text>
  </g>

  <g>
