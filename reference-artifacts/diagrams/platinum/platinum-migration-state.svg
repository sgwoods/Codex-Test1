    <text x="148" y="710" fill="#8BE8FF" font-size="30" font-family="Menlo, Monaco, monospace" font-weight="700">Current recommendation</text>
    <text x="148" y="754" fill="#EAF3FF" font-size="23" font-family="Menlo, Monaco, monospace">1. Verify the Platinum-framed Aurora experience manually once more.</text>
    <text x="148" y="788" fill="#EAF3FF" font-size="23" font-family="Menlo, Monaco, monospace">2. Close the remaining Aurora gameplay follow-ups that matter to trust and clarity.</text>
    <text x="148" y="822" fill="#EAF3FF" font-size="23" font-family="Menlo, Monaco, monospace">3. Only then begin the first truly playable Galaxy Guardians slice.</text>
