    <circle cx="818" cy="202" r="1.7"/>
    <circle cx="910" cy="154" r="1.9"/>
    <circle cx="1032" cy="214" r="1.8"/>
    <circle cx="1000" cy="572" r="2"/>
    <circle cx="860" cy="472" r="1.8"/>
    <circle cx="714" cy="548" r="2"/>
    <circle cx="584" cy="484" r="1.8"/>
    <circle cx="422" cy="570" r="2"/>
    <circle cx="254" cy="480" r="1.8"/>
    <circle cx="154" cy="612" r="1.9"/>
  </g>

