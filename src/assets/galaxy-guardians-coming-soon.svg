    <rect x="-18" y="-88" width="36" height="68" rx="12" fill="#ffd86e" stroke="#fff3a8" stroke-opacity=".45"/>
    <circle cx="0" cy="-20" r="14" fill="#ff554b"/>
    <path d="M-26 114 0 74 26 114 0 142Z" fill="#ffe277" fill-opacity=".92"/>
    <path d="M-176 4 -214 -10 -252 4 -214 18Z" fill="#cfeeff" fill-opacity=".95"/>
    <path d="M176 4 214 -10 252 4 214 18Z" fill="#cfeeff" fill-opacity=".95"/>
  </g>

  <g opacity=".24">
    <path d="M278 478c74-24 182-36 322-36 144 0 264 12 356 36" fill="none" stroke="#6cdfff" stroke-width="2" stroke-dasharray="8 12"/>
