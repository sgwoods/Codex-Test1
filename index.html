<html lang="en">

#msg .scoreRank{color:#f4f7ff;text-align:left}
#msg .scoreName{color:#f4f7ff;text-align:center;min-width:3.4em}

#msg .scoreStage{color:#a9d8ff}
#msg .scoreHot{color:#ffd86d}

#msg .entryCursor{display:inline-block;min-width:.72em;color:#000;background:#ffd86d;animation:blinkCursor .7s steps(1,end) infinite}
#msg .gameOverFoot{display:block;color:#f4f7ff;font-size:.78em;letter-spacing:.05em;margin-top:.7em}
#msg .blinkPrompt{animation:blinkPrompt .8s steps(1,end) infinite}
#msg.gameOverScreen{top:52%;width:min(92vw,980px);font-size:clamp(26px,2.15vw,38px);line-height:1.06}
#msg.gameOverScreen .gameOverTitle{font-size:1.34em;letter-spacing:.14em;margin-bottom:.16em}
#msg.gameOverScreen .gameOverSub{font-size:.9em;letter-spacing:.08em;margin-bottom:.35em}

#feedbackBtn{position:fixed;top:62px;right:16px;z-index:30;border:1px solid rgba(136,245,255,.6);background:rgba(8,18,35,.75);color:#dbf8ff;padding:7px 11px;font:700 14px/1 "Courier New",Consolas,monospace;border-radius:999px;cursor:pointer;backdrop-filter:blur(2px);transition:background .14s,border-color .14s}
#feedbackBtn:hover{background:rgba(19,43,84,.85);border-color:rgba(136,245,255,.95)}
#exportBtn{position:fixed;top:98px;right:16px;z-index:30;border:1px solid rgba(170,205,255,.55);background:rgba(10,15,28,.7);color:#e6f1ff;padding:7px 11px;font:700 13px/1 "Courier New",Consolas,monospace;border-radius:999px;cursor:pointer;backdrop-filter:blur(2px);transition:background .14s,border-color .14s}

#recordBtn:hover{background:rgba(64,17,17,.88);border-color:rgba(255,115,115,.92)}
#recordBtn.active{border-color:rgba(255,84,84,.95);background:rgba(92,15,15,.9);color:#fff3f3}
#recordBtn[disabled]{opacity:.45;cursor:default}
#testBtn{position:fixed;top:170px;right:16px;z-index:30;border:1px solid rgba(145,255,179,.45);background:rgba(10,28,14,.72);color:#e8fff0;padding:7px 11px;font:700 13px/1 "Courier New",Consolas,monospace;border-radius:999px;cursor:pointer;backdrop-filter:blur(2px)}

#testPanel h3{margin:0 0 8px;font-size:15px;color:#d8ffe4}
#testPanel label{display:block;margin:6px 0 3px;font-size:12px;color:#b7efd0}

#testRow{display:flex;align-items:center;gap:8px;margin-top:8px}

#feedbackPanel{width:min(560px,calc(100vw - 26px));background:rgba(8,13,25,.96);border:1px solid rgba(136,245,255,.4);box-shadow:0 12px 60px rgba(0,0,0,.7);padding:14px}

.k{color:var(--a)}

<body>
<canvas id="c"></canvas>
<div id="hud"><div id="left"></div><div id="right"></div></div>
<div id="msg"></div>
<button id="feedbackBtn" aria-expanded="false" aria-controls="feedbackModal">Feedback</button>
<button id="exportBtn">Export Log</button>
<button id="recordBtn" type="button">Auto Video: On</button>
<button id="testBtn" type="button">Test Setup</button>
<div id="testPanel" aria-hidden="true">
  <h3>Test Setup</h3>
  <label for="testStage">Start Stage</label>
  <input id="testStage" type="number" min="1" max="99" step="1" value="1" />
  <label for="testShips">Starting Ships</label>
  <input id="testShips" type="number" min="1" max="9" step="1" value="3" />
  <div id="testRow">
    <input id="testChallenge" type="checkbox" />
    <label for="testChallenge">Force challenge opening</label>
  </div>
  <div id="testHint">Applies on next game start only.</div>
</div>
<div id="feedbackModal" aria-hidden="true">
  <div id="feedbackPanel" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
    <h2 id="feedbackTitle">Send Feedback</h2>
    <form id="feedbackForm">
      <label for="fbType">Type</label>
      <select id="fbType" required>
        <option value="bug_report">Bug Report</option>
        <option value="feature_request">Feature Request</option>
      </select>
      <label for="fbSummary">Title</label>
      <input id="fbSummary" maxlength="120" placeholder="Short summary" required />
      <label for="fbDescription">Description</label>
      <textarea id="fbDescription" maxlength="3000" placeholder="What happened? Steps to reproduce? Expected behavior?" required></textarea>
      <div id="feedbackActions">
        <button type="button" id="fbCancel">Cancel</button>
        <button type="submit">Submit</button>
      </div>
      <div id="feedbackStatus"></div>
    </form>
  </div>
</div>
<div id="feedbackToast" aria-live="polite"></div>

function randUnit(){
 if(!RNG_SEED)return Math.random();

 let t=Math.imul(RNG_STATE^RNG_STATE>>>15,1|RNG_STATE);
 t^=t+Math.imul(t^t>>>7,61|t);
 return((t^t>>>14)>>>0)/4294967296;
}
function setSeed(seed=0){
 RNG_SEED=(+seed>>>0)||0;
 RNG_STATE=RNG_SEED||0;
 if(RNG_SEED)localStorage.setItem(SEED_PREF_KEY,String(RNG_SEED));
 else localStorage.removeItem(SEED_PREF_KEY);
 return RNG_SEED;
}

function formatScore(v){return String(Math.max(0,v|0)).padStart(6,'0')}
function sanitizeInitials(txt=''){return String(txt).toUpperCase().replace(/[^A-Z]/g,'').slice(0,3)}
function cycleInitial(ch='A',dir=1){
 const code=((String(ch||'A').charCodeAt(0)-65+dir+26)%26)+65;
 return String.fromCharCode(code);
}
function recordScore(score,stage){
 const entry={id:`${Date.now()}-${Math.random().toString(36).slice(2,7)}`,initials:'YOU',score:score|0,stage:stage|0,at:new Date().toISOString()};
 const board=loadScoreboard();
 board.push(entry);
 board.sort((a,b)=>b.score-a.score||b.stage-a.stage||a.at.localeCompare(b.at));
 const top=board.slice(0,10);
 saveScoreboard(top);
 S.best=top[0]?.score||0;
 localStorage.galagaTribBest=S.best;
 return{entry,board:top,rank:top.findIndex(x=>x.id===entry.id)+1};
}
function saveGameOverInitials(){
 if(!gameOverState?.entryId)return;
 const board=loadScoreboard();
 const row=board.find(x=>x.id===gameOverState.entryId);
  if(row){
  row.initials=sanitizeInitials(gameOverState.initials.join('')).padEnd(3,'-');
  saveScoreboard(board);
 }
}
function buildGameOverHtmlFromState(){
 if(!gameOverState)return '';
 const board=loadScoreboard();
 const rows=board.map((row,i)=>`<span class="scoreRank${row.id===gameOverState.entryId?' scoreHot':''}">${String(i+1).padStart(2,'0')}</span><span class="scoreName${row.id===gameOverState.entryId?' scoreHot':''}">${row.initials}</span><span class="scoreValue${row.id===gameOverState.entryId?' scoreHot':''}">${formatScore(row.score)}</span><span class="scoreStage${row.id===gameOverState.entryId?' scoreHot':''}">${String(row.stage).padStart(2,' ')}</span>`).join('');
 const rankTxt=gameOverState.rank?`RANK ${String(gameOverState.rank).padStart(2,'0')}`:'OUT OF TOP 10';
 let entryHtml='';
 let footHtml='<span class="gameOverFoot blinkPrompt"><span class="k">Enter</span> to play again</span>';
 if(gameOverState.editing){
  const shown=gameOverState.initials.map((ch,i)=>`<span class="${i===gameOverState.cursor?'entryCursor':''}">${ch||'_'}</span>`).join(' ');
  entryHtml=`<span class="gameOverEntry">ENTER INITIALS ${shown}</span>`;
  footHtml='<span class="gameOverFoot"><span class="k">Left/Right</span> move, <span class="k">Up/Down</span> change, type letters, <span class="k">Enter</span> to save</span>';
 }
 return `<span class="gameOverTitle">GAME OVER</span><span class="gameOverSub">TOP 10 PILOTS   ${rankTxt}</span>${entryHtml}<span class="scoreTable"><span class="scoreHead scoreRank">NO</span><span class="scoreHead scoreName">ID</span><span class="scoreHead scoreValue">SCORE</span><span class="scoreHead scoreStage">STG</span>${rows}</span>${footHtml}`;
}
function buildGameOverState(score,stage){
 const res=recordScore(score,stage);
 const editing=!!res.rank;
 return{
  entryId:res.entry.id,
  rank:res.rank,
  initials:['Y','O','U'],
  cursor:0,
  editing
 };
}

function videoRecordSupported(){return !!(c.captureStream&&window.MediaRecorder);}
function pickVideoMime(){
 const list=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
 for(const m of list)if(!window.MediaRecorder||!MediaRecorder.isTypeSupported||MediaRecorder.isTypeSupported(m))return m;
 return '';
}
function syncRecordUi(){
 const supported=videoRecordSupported();
 recordBtn.disabled=!supported;
 recordBtn.classList.toggle('active',VIDEO_REC.enabled||VIDEO_REC.active);
 recordBtn.textContent=supported?(VIDEO_REC.active?'Recording Video...':`Auto Video: ${VIDEO_REC.enabled?'On':'Off'}`):'Auto Video: Unsupported';
}
function stopRunRecording(){
 if(!VIDEO_REC.active||!VIDEO_REC.rec)return;
 VIDEO_REC.active=0;
 if(sfx.recOsc){try{sfx.recOsc.stop();}catch{}try{sfx.recOsc.disconnect();}catch{}sfx.recOsc=null}
 if(sfx.recGain){try{sfx.recGain.disconnect();}catch{}sfx.recGain=null}
 const rec=VIDEO_REC.rec;
 VIDEO_REC.rec=null;
 try{rec.stop();}catch{}
 syncRecordUi();
}
function startRunRecording(){
 if(!VIDEO_REC.enabled||!videoRecordSupported())return;
 if(VIDEO_REC.active)stopRunRecording();
 const A=AC();A.resume?.();
 sfx.recGain=A.createGain();
 sfx.recGain.gain.value=.00035;
 sfx.recOsc=A.createOscillator();
 sfx.recOsc.type='sine';
 sfx.recOsc.frequency.value=23;
 sfx.recOsc.connect(sfx.recGain);
 sfx.recGain.connect(sfx.tap);
 sfx.recOsc.start();
 VIDEO_REC.mime=pickVideoMime();
 const videoStream=c.captureStream(60),stream=new MediaStream();
 for(const t of videoStream.getVideoTracks())stream.addTrack(t);
 if(sfx.tap)for(const t of sfx.tap.stream.getAudioTracks())stream.addTrack(t);
 VIDEO_REC.stream=stream;
 VIDEO_REC.chunks.length=0;
 VIDEO_REC.sessionId=REC?.id||`run-${Date.now()}`;
 VIDEO_REC.file=`neo-galaga-video-${VIDEO_REC.sessionId}.webm`;
 const rec=VIDEO_REC.mime?new MediaRecorder(VIDEO_REC.stream,{mimeType:VIDEO_REC.mime}):new MediaRecorder(VIDEO_REC.stream);
 rec.ondataavailable=e=>{if(e.data&&e.data.size)VIDEO_REC.chunks.push(e.data);};
 rec.onstop=()=>{
  const blob=new Blob(VIDEO_REC.chunks,{type:VIDEO_REC.mime||'video/webm'});
  if(VIDEO_REC.stream){for(const t of VIDEO_REC.stream.getTracks())t.stop();VIDEO_REC.stream=null;}
  VIDEO_REC.chunks.length=0;
  if(blob.size>0){downloadBlob(blob,VIDEO_REC.file);showToast('Run video downloaded');}
 };
 rec.start(1000);
 VIDEO_REC.rec=rec;
 VIDEO_REC.active=1;
 syncRecordUi();
}

async function submitFeedback(ev){
 ev.preventDefault();
 if(feedbackBusy)return;
 const now=Date.now(),wait=FEEDBACK_RATE_MS-(now-feedbackLastSubmit);
 if(wait>0){setFeedbackStatus(`Please wait ${Math.ceil(wait/1000)}s before sending another report.`,1);return;}
 const type=fbType.value==='feature_request'?'feature_request':'bug_report';
 const title=fbSummary.value.trim().replace(/\s+/g,' ');
 const description=fbDescription.value.trim();
 if(title.length<4){setFeedbackStatus('Title must be at least 4 characters.',1);return;}
 if(description.length<10){setFeedbackStatus('Description must be at least 10 characters.',1);return;}
 feedbackBusy=1;
 setFeedbackStatus('Sending feedback...');
  const payload={
  type,title,description,
  timestamp:new Date(now).toISOString(),
  game:{name:'Neo Galaga Tribute',version:BUILD,url:location.href,user_agent:navigator.userAgent,language:navigator.language},
  game_state:{stage:S.stage,score:S.score,lives:Math.max(0,S.lives+1),started:!!started,paused:!!paused,challenge:!!S.challenge}
 };
 const kind=type==='feature_request'?'Feature Request':'Bug Report';
 const subject=`[${kind}] ${title}`;
 const lines=[
  description,'',
  '---',
  `Type: ${kind}`,
  `Build: ${BUILD}`,
  `Timestamp: ${payload.timestamp}`,
  `URL: ${location.href}`,
  `Stage: ${S.stage}`,
  `Score: ${S.score}`,
  `Lives: ${Math.max(0,S.lives+1)}`,
  `Started: ${started?1:0}`,
  `Paused: ${paused?1:0}`,
  `Challenge: ${S.challenge?1:0}`,
  `User-Agent: ${navigator.userAgent}`
 ];
 try{
  const r=await fetch(FORMSUBMIT_ENDPOINT,{
   method:'POST',
   headers:{'Content-Type':'application/json','Accept':'application/json'},
   body:JSON.stringify({
    _subject:subject,
    _template:'table',
    product:'Neo Galaga Tribute',
    type:kind,
    title,
    description,
    build:BUILD,
    timestamp:payload.timestamp,
    url:location.href,
    stage:S.stage,
    score:S.score,
    lives:Math.max(0,S.lives+1),
    started:started?1:0,
    paused:paused?1:0,
    challenge:S.challenge?1:0,
    user_agent:navigator.userAgent,
    message:lines.join('\n')
   })
  });
  const data=await r.json().catch(()=>null);
  if(!r.ok||data?.success===false)throw new Error(data?.message||`HTTP ${r.status}`);
  feedbackLastSubmit=now;
  fbType.value='bug_report';fbSummary.value='';fbDescription.value='';
  setFeedbackStatus('Sent to Modem inbox.');
  showToast('Feedback sent');
  setTimeout(()=>closeFeedback(),220);
 }catch(err){
  openMailFallback(subject,lines);
  setFeedbackStatus('FormSubmit could not send directly. Opened mail draft fallback.',1);
  showToast('Mail fallback opened');
 }
 feedbackBusy=0;
 return;
}

 for(const b of S.eb){ctx.fillStyle='#ff5e5e';ctx.fillRect(b.x-1,b.y-10,2,13)}
 for(const e of S.e)if(e.hp>0)drawEnemy(e);
 const p=S.p;if((!p.pending||p.spawn<=.3)&&!p.spawn){if(!(p.inv>0&&Math.floor(p.inv*14)%2))drawPlayerBody(p.x,p.y,p.dual,0)}
 if(p.captured)drawPlayerBody(p.x,p.y,0,1);
 drawPostFx();
 ctx.restore();
 ctx.setTransform(1,0,0,1,0,0);
 left.innerHTML=`<span style=\"color:#ff2d2d\">1UP</span> ${S.score.toString().padStart(6,'0')}   <span style=\"color:#ff2d2d\">HIGH SCORE</span> ${String(S.best).padStart(6,'0')}   STAGE ${S.stage}`;
 right.textContent=`SHIPS ${Math.max(0,S.lives+1)}${S.ultra?'  U':''}${document.fullscreenElement?'  F':''}${VIDEO_REC.active?'  REC':''}`;
 const toolsVisible=!started||paused||feedbackOpen;
 feedbackBtn.style.display=toolsVisible?'block':'none';
 exportBtn.style.display=toolsVisible?'block':'none';
 recordBtn.style.display=toolsVisible?'block':'none';
 testBtn.style.display=toolsVisible?'block':'none';
 if(!toolsVisible)testPanel.classList.remove('open');
 else testPanel.classList.toggle('open',testOpen);
 msg.className=!started&&gameOverHtml?'gameOverScreen':'';
 if(!started)msg.innerHTML=gameOverHtml||'PRESS <span class=\"k\">ENTER</span> TO START\n<span class=\"k\">F</span> FULLSCREEN   <span class=\"k\">U</span> ULTRA SCALE';
 else if(paused)msg.innerHTML='PAUSED\n\nPress <span class="k">P</span> to resume';
 else if(S.alertT>0)msg.textContent=S.alertTxt;
 else if(S.banner>0){
  if(S.bannerMode==='challengeIntro')msg.innerHTML=`<span class="splashTitle">${S.bannerTxt}</span><span class="splashSub">${S.bannerSub}</span>`;
  else if(S.bannerMode==='challenge')msg.innerHTML=`<span class="splashTitle">${S.bannerTxt}</span><span class="splashSub">${S.bannerSub}</span>`;
  else if(S.bannerMode==='challengeResult'){
   const parts=String(S.bannerSub||'').split('\n');
   msg.innerHTML=`<span class="splashTitle">${S.bannerTxt}</span><span class="splashScore">${parts[0]||''}</span>${parts[1]?`<span class="splashSub">${parts[1]}</span>`:''}`;
  }else if(S.bannerMode==='stage')msg.innerHTML=`<span class="splashSub">${S.bannerTxt}</span>`;
  else msg.textContent=S.bannerTxt;
 }
 else msg.textContent='';
}

window.__galagaHarness__={
 start(cfg={}){
  if(cfg.seed!==undefined)setSeed(cfg.seed);
  if(typeof cfg.autoVideo==='boolean'){
   VIDEO_REC.enabled=!!cfg.autoVideo;
   localStorage.setItem(RECORD_PREF_KEY,VIDEO_REC.enabled?'1':'0');
   syncRecordUi();
  }
  if(cfg.stage||cfg.ships||cfg.challenge!==undefined){
   testStage.value=cl(+cfg.stage||1,1,99)|0;
   testShips.value=cl(+cfg.ships||3,1,9)|0;
   testChallenge.checked=!!cfg.challenge;
   saveTestCfg();
  }
  if(!started)start();
 },
 stop(label='harness'){
  logEvent('harness_stop',{label});
  logSnapshot('harness_stop');
  if(VIDEO_REC.enabled)exportSession({auto:1,silent:1});
  stopRunRecording();
  started=0;paused=0;
  msg.textContent='';
 },
 export(){exportSession({silent:1})},
 snapshot(){return snapshot()},
 state(){return{started,paused,stage:S.stage,score:S.score,lives:Math.max(0,S.lives+1),challenge:!!S.challenge,recording:!!VIDEO_REC.active,seed:RNG_SEED}},
 setAutoVideo(v){
  VIDEO_REC.enabled=!!v;
  localStorage.setItem(RECORD_PREF_KEY,VIDEO_REC.enabled?'1':'0');
  syncRecordUi();
 },
 setTest(cfg={}){
  testStage.value=cl(+cfg.stage||1,1,99)|0;
  testShips.value=cl(+cfg.ships||3,1,9)|0;
  testChallenge.checked=!!cfg.challenge;
 saveTestCfg();
 }
};

setSeed(localStorage.getItem(SEED_PREF_KEY)||0);
function loop(ts){const dt=Math.min(.033,(ts-t0)/1000||0);t0=ts;update(dt);draw();requestAnimationFrame(loop)}
resetSession();
logEvent('boot');
logSnapshot('boot');
syncRecordUi();
syncTestUi();
rs();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
