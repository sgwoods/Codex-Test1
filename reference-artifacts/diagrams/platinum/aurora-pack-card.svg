<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#140E12"/>
      <stop offset="1" stop-color="#281922"/>
    </linearGradient>
    <linearGradient id="aAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCD70"/>
      <stop offset="1" stop-color="#F05E1D"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#aBg)"/>
  <rect x="40" y="40" width="1120" height="680" rx="28" fill="#120F18" stroke="#F08C42" stroke-width="2"/>
  <text x="80" y="122" fill="#FFF5EC" font-size="58" font-family="Menlo, Monaco, monospace" font-weight="700">Aurora Galactica</text>
  <text x="80" y="168" fill="#FFC982" font-size="28" font-family="Menlo, Monaco, monospace">Current Platinum game pack</text>

  <rect x="80" y="216" width="490" height="180" rx="24" fill="#1B1720" stroke="#F08C42" stroke-width="2"/>
  <text x="112" y="268" fill="#FFC982" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">Core identity</text>
  <text x="112" y="314" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">Galaga-family tribute with capture, rescue,</text>
  <text x="112" y="346" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">dual-fighter play, challenge stages, and</text>
  <text x="112" y="378" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">Aurora-owned theme, boss, text, and audio direction.</text>

  <rect x="610" y="216" width="510" height="180" rx="24" fill="#1B1720" stroke="#F08C42" stroke-width="2"/>
  <text x="642" y="268" fill="#FFC982" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">Aurora owns</text>
  <text x="642" y="314" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">stage flow, challenge cadence, scoring,</text>
  <text x="642" y="346" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">capture/rescue, enemy and boss behavior,</text>
  <text x="642" y="378" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">sprites, text, and future Game Designer definitions.</text>

  <rect x="80" y="438" width="1040" height="224" rx="24" fill="#16121B" stroke="#FFB15B" stroke-width="2"/>
  <text x="112" y="492" fill="#FFC982" font-size="28" font-family="Menlo, Monaco, monospace" font-weight="700">Current role on Platinum</text>
  <text x="112" y="540" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">Aurora is the first fully playable pack and the proof that Platinum can host a real game.</text>
  <text x="112" y="574" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">The current platform objective is to rerelease Aurora cleanly with Platinum framing</text>
  <text x="112" y="608" fill="#FFF2E8" font-size="22" font-family="Menlo, Monaco, monospace">while keeping the shipped 1.0.2 gameplay contract intact.</text>

  <rect x="80" y="690" width="332" height="18" rx="9" fill="url(#aAccent)"/>
</svg>
