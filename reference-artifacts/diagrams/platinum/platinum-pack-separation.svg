<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07101C"/>
      <stop offset="1" stop-color="#101C30"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg2)"/>
  <text x="86" y="88" fill="#F3F8FF" font-size="52" font-family="Menlo, Monaco, monospace" font-weight="700">Platinum vs Game Packs</text>
  <text x="86" y="132" fill="#A7B7D8" font-size="24" font-family="Menlo, Monaco, monospace">A clearer ownership split between the host platform and the games it carries.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="190" width="440" height="660" rx="34" fill="#102035" stroke="#59D8FF" stroke-width="2"/>
    <text x="118" y="254" fill="#8BE8FF" font-size="40" font-family="Menlo, Monaco, monospace" font-weight="700">Platinum</text>
    <text x="118" y="300" fill="#EAF3FF" font-size="24" font-family="Menlo, Monaco, monospace">Host platform</text>
    <text x="118" y="360" fill="#CFE7FF" font-size="23" font-family="Menlo, Monaco, monospace">- shell and framing</text>
    <text x="118" y="398" fill="#CFE7FF" font-size="23" font-family="Menlo, Monaco, monospace">- pack picker</text>
    <text x="118" y="436" fill="#CFE7FF" font-size="23" font-family="Menlo, Monaco, monospace">- platform splash</text>
    <text x="118" y="474" fill="#CFE7FF" font-size="23" font-family="Menlo, Monaco, monospace">- auth and leaderboard adapters</text>
    <text x="118" y="512" fill="#CFE7FF" font-size="23" font-family="Menlo, Monaco, monospace">- replay plumbing</text>
    <text x="118" y="550" fill="#CFE7FF" font-size="23" font-family="Menlo, Monaco, monospace">- platform-only harnesses</text>
    <text x="118" y="588" fill="#CFE7FF" font-size="23" font-family="Menlo, Monaco, monospace">- publish and lane checks</text>

    <rect x="602" y="190" width="400" height="300" rx="34" fill="#261A1B" stroke="#F48A4B" stroke-width="2"/>
    <text x="636" y="252" fill="#FFC782" font-size="34" font-family="Menlo, Monaco, monospace" font-weight="700">Aurora Galactica</text>
    <text x="636" y="292" fill="#FFF3E8" font-size="22" font-family="Menlo, Monaco, monospace">Current playable game pack</text>
    <text x="636" y="348" fill="#FFF3E8" font-size="22" font-family="Menlo, Monaco, monospace">- formations and stage flow</text>
    <text x="636" y="382" fill="#FFF3E8" font-size="22" font-family="Menlo, Monaco, monospace">- capture and rescue</text>
    <text x="636" y="416" fill="#FFF3E8" font-size="22" font-family="Menlo, Monaco, monospace">- challenge stages</text>
    <text x="636" y="450" fill="#FFF3E8" font-size="22" font-family="Menlo, Monaco, monospace">- Aurora-owned art, text, audio</text>

    <rect x="602" y="550" width="400" height="300" rx="34" fill="#211935" stroke="#B38BFF" stroke-width="2"/>
    <text x="636" y="612" fill="#E8D7FF" font-size="34" font-family="Menlo, Monaco, monospace" font-weight="700">Galaxy Guardians</text>
    <text x="636" y="652" fill="#F3ECFF" font-size="22" font-family="Menlo, Monaco, monospace">Future sibling game pack</text>
    <text x="636" y="708" fill="#F3ECFF" font-size="22" font-family="Menlo, Monaco, monospace">- Galaxian-inspired rules</text>
    <text x="636" y="742" fill="#F3ECFF" font-size="22" font-family="Menlo, Monaco, monospace">- its own stage and enemy identity</text>
    <text x="636" y="776" fill="#F3ECFF" font-size="22" font-family="Menlo, Monaco, monospace">- its own assets and designer surfaces</text>

    <rect x="1090" y="190" width="430" height="660" rx="34" fill="#121B2D" stroke="#7EA7FF" stroke-width="2"/>
    <text x="1126" y="252" fill="#B9D0FF" font-size="36" font-family="Menlo, Monaco, monospace" font-weight="700">Shared seam</text>
    <text x="1126" y="300" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">This is where Platinum and packs meet:</text>
    <text x="1126" y="366" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">- metadata and game key</text>
    <text x="1126" y="402" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">- shell themes</text>
    <text x="1126" y="438" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">- stage presentation</text>
    <text x="1126" y="474" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">- challenge layout</text>
    <text x="1126" y="510" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">- scoring tables</text>
    <text x="1126" y="546" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">- entity contract and capability flags</text>
    <text x="1126" y="582" fill="#EAF3FF" font-size="22" font-family="Menlo, Monaco, monospace">- pack-specific harness families</text>

    <rect x="1126" y="652" width="354" height="124" rx="24" fill="#182640" stroke="#58D6FF" stroke-width="2"/>
    <text x="1154" y="704" fill="#8BE8FF" font-size="24" font-family="Menlo, Monaco, monospace" font-weight="700">Rule of thumb</text>
    <text x="1154" y="740" fill="#EAF3FF" font-size="21" font-family="Menlo, Monaco, monospace">If it should work for multiple games,</text>
    <text x="1154" y="770" fill="#EAF3FF" font-size="21" font-family="Menlo, Monaco, monospace">it probably belongs to Platinum.</text>
  </g>

  <path d="M518 356H586" stroke="#58D6FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M518 694H586" stroke="#58D6FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M1002 356H1070" stroke="#7EA7FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M1002 694H1070" stroke="#7EA7FF" stroke-width="6" stroke-linecap="round"/>
</svg>
