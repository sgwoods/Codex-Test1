  <rect x="84" y="70" width="1032" height="620" rx="28" fill="#091120" fill-opacity=".34" stroke="url(#panelStroke)"/>
  <rect x="108" y="94" width="984" height="572" rx="22" fill="none" stroke="#d3ecff" stroke-opacity=".08"/>
  <rect x="152" y="126" width="896" height="2" fill="url(#titleGlow)" opacity=".45"/>

  <g fill="#eef7ff" opacity=".86">
    <circle cx="134" cy="158" r="2.1"/>
    <circle cx="232" cy="216" r="1.8"/>
    <circle cx="328" cy="132" r="1.8"/>
    <circle cx="438" cy="212" r="1.7"/>
    <circle cx="520" cy="156" r="1.9"/>
