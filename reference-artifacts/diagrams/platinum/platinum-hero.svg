  <text x="110" y="226" fill="#ECF7FF" font-size="86" font-family="Menlo, Monaco, monospace" font-weight="700">PLATINUM</text>
  <text x="116" y="286" fill="#8BE8FF" font-size="34" font-family="Menlo, Monaco, monospace" font-weight="700">Arcade Game Platform</text>
  <text x="116" y="356" fill="#D8E8FF" font-size="28" font-family="Menlo, Monaco, monospace">Hosts the cabinet shell, runtime, service adapters, and shared contracts</text>
  <text x="116" y="396" fill="#D8E8FF" font-size="28" font-family="Menlo, Monaco, monospace">that let multiple fixed-screen shooters live on one coherent platform.</text>

