<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aurora Conformance Dashboard</title>
  <style>
    :root{
      color-scheme:light;
      --page:#f5f3ee;
      --ink:#191714;
      --muted:#69645d;
      --panel:#ffffff;
      --line:#d8d2c7;
      --rail:#24221f;
      --green:#16784f;
      --yellow:#9c6f0a;
      --red:#b03a2e;
      --blue:#285e8e;
      --shadow:0 16px 36px rgba(27,24,19,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--page);
      color:var(--ink);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size:15px;
      line-height:1.45;
    }
    a{color:var(--blue)}
    .shell{width:min(100%,1440px);margin:0 auto;padding:18px 20px;overflow-x:hidden}
    header{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:18px;
      align-items:end;
      padding:22px 0 18px;
      border-bottom:3px solid var(--rail);
    }
    h1{margin:0;font-size:32px;line-height:1.05;letter-spacing:0}
    .subtitle{margin:8px 0 0;color:var(--muted);max-width:920px}
    .controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    .gameSelectGroup{
      display:grid;
      gap:3px;
      color:var(--muted);
      font-size:10px;
      text-transform:uppercase;
      font-weight:850;
      letter-spacing:.08em;
    }
    .gameSelectGroup select{
      min-width:220px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--ink);
      border-radius:6px;
      padding:8px 10px;
      font-size:13px;
      font-weight:800;
      text-transform:none;
      letter-spacing:0;
    }
    .pill,.button{
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--ink);
      border-radius:6px;
      padding:8px 10px;
      text-decoration:none;
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
    }
    .pill{cursor:pointer}
    .pill:disabled{cursor:wait;opacity:.75}
    .button{box-shadow:0 2px 0 rgba(0,0,0,.12)}
    .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:14px 0}
    .tabs{
      display:flex;
      gap:8px;
      margin:4px 0 16px;
      border-bottom:1px solid var(--line);
    }
    .tab{
      border:1px solid var(--line);
      border-bottom:0;
      background:#ede8df;
      color:var(--ink);
      border-radius:7px 7px 0 0;
      padding:9px 13px;
      font-weight:850;
      cursor:pointer;
    }
    .tab.active{
      background:var(--panel);
      box-shadow:0 -1px 0 var(--panel) inset;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      padding:12px;
      box-shadow:var(--shadow);
      min-width:0;
    }
    .label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:800;letter-spacing:.08em;margin-bottom:5px}
    .value{font-size:clamp(18px,2vw,22px);font-weight:850;letter-spacing:0;overflow-wrap:anywhere}
    .split{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,380px);gap:14px;align-items:start}
    section{margin-top:12px}
    h2{margin:0 0 10px;font-size:18px;letter-spacing:0}
    table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);table-layout:fixed}
    th,td{padding:10px 11px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}
    th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#4e4a43;background:#ece6db}
    tr:last-child td{border-bottom:0}
    .priority{font-weight:850;text-align:center;width:48px}
    .metric{font-weight:800;min-width:0}
    .metricList{display:grid;gap:10px}
    .metricRow{
      display:grid;
      grid-template-columns:46px minmax(0,1.7fr) minmax(92px,.45fr) minmax(120px,.7fr) minmax(0,1.2fr) auto;
      gap:10px;
      align-items:center;
      padding:11px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      box-shadow:var(--shadow);
      min-width:0;
    }
    .metricRow.expanded{align-items:start}
    .metricRow .detailPanel{
      grid-column:1/-1;
      box-shadow:none;
      background:#fbfaf7;
    }
    .metricName{font-weight:850;min-width:0;overflow-wrap:anywhere}
    .metricSub{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .metricNext{font-size:13px;color:#34302a;min-width:0;overflow-wrap:anywhere}
    .detailButton,.backButton{
      border:1px solid var(--line);
      background:#fbfaf7;
      color:var(--ink);
      border-radius:6px;
      padding:7px 9px;
      font-size:12px;
      font-weight:850;
      cursor:pointer;
      white-space:nowrap;
    }
    .detailPanel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      padding:13px;
      box-shadow:var(--shadow);
      min-width:0;
    }
    .detailHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
      margin-bottom:10px;
    }
    .detailHeader h2{margin:0}
    .detailGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .overviewStack{display:grid;gap:12px}
    .metricDetails summary{
      cursor:pointer;
      list-style-position:outside;
      padding:0 0 0 2px;
    }
    .metricDetails summary span{
      display:inline;
      text-decoration:underline;
      text-decoration-style:dotted;
      text-underline-offset:3px;
    }
    .metricExplanation{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin-top:10px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:7px;
      background:#fbfaf7;
      font-weight:500;
    }
    .metricExplanationHeader{
      grid-column:1/-1;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding-bottom:8px;
      border-bottom:1px solid var(--line);
    }
    .metricExplanationTitle{font-weight:850}
    .closeDetails{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:6px;
      padding:4px 8px;
      font-size:12px;
      font-weight:850;
      cursor:pointer;
      white-space:nowrap;
    }
    .explainBlock{
      min-width:0;
      padding:8px;
      border:1px solid #ebe5da;
      border-radius:6px;
      background:#fffefa;
      font-size:13px;
      line-height:1.35;
    }
    .explainLabel{
      display:block;
      color:var(--muted);
      font-size:10px;
      text-transform:uppercase;
      font-weight:850;
      letter-spacing:.08em;
      margin-bottom:2px;
    }
    .badge{
      display:inline-block;
      border:1px solid var(--line);
      border-radius:999px;
      padding:3px 7px;
      background:#fbfaf7;
      font-size:12px;
      font-weight:800;
      color:#4e4a43;
      white-space:nowrap;
    }
    .costStrip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:0 0 12px}
    .costPanelGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .chartGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .chartCard{display:grid;gap:8px}
    .chartCard img{width:100%;height:auto;border:1px solid var(--line);border-radius:7px;background:#fff}
    .chartLinks{display:flex;gap:8px;flex-wrap:wrap}
    .compactTable th,.compactTable td{font-size:13px;padding:8px;overflow-wrap:anywhere}
    .ingestionList{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
    .ingestionItem{display:grid;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px;box-shadow:var(--shadow);min-width:0}
    .ingestionItem.expanded{grid-row:span 2}
    .ingestionItem .detailPanel{box-shadow:none;background:#fbfaf7}
    .ingestionMeta{display:flex;gap:6px;flex-wrap:wrap}
    .score{font-weight:850;white-space:nowrap}
    .costCell{min-width:150px}
    .good{color:var(--green)} .watch{color:var(--yellow)} .gap{color:var(--red)}
    .small{font-size:13px;color:var(--muted)}
    .axisList{display:grid;gap:8px;margin:0;padding:0;list-style:none}
    .axisList li{padding:10px;border:1px solid var(--line);border-radius:7px;background:#fbfaf7}
    .evidence{display:grid;gap:8px}
    .evidence a{word-break:break-word}
    .ingestionGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:14px}
    .ingestionLead{max-width:980px;margin:0 0 14px;color:var(--muted)}
    .anchorCell{max-width:260px;word-break:break-word}
    .statusLine{margin-top:10px;color:var(--muted);font-size:13px}
    .dirty{color:var(--red)}
    .clean{color:var(--green)}
    .provenanceStrip{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:10px;
      margin:14px 0;
    }
    .provenanceCard{
      min-width:0;
      padding:10px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fbfaf7;
      box-shadow:0 8px 20px rgba(27,24,19,.06);
    }
    .provenanceCard strong{
      display:block;
      font-size:13px;
      overflow-wrap:anywhere;
    }
    .provenanceCard small{
      display:block;
      margin-top:3px;
      color:var(--muted);
      overflow-wrap:anywhere;
    }
    .compareGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin:0 0 14px}
    .compareCard{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      padding:12px;
      box-shadow:var(--shadow);
      display:grid;
      gap:8px;
    }
    .compareMeta{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .compareActions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:2px;
    }
    @media (max-width:980px){
      header{grid-template-columns:1fr}
      .controls{justify-content:flex-start}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .ingestionGrid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .provenanceStrip{grid-template-columns:repeat(2,minmax(0,1fr))}
      .split{grid-template-columns:1fr}
      .metricRow{grid-template-columns:38px minmax(0,1fr) minmax(82px,.35fr);align-items:start}
      .metricNext,.metricRow .costCell,.metricRow .detailButton{grid-column:2/-1}
      .costStrip,.costPanelGrid,.detailGrid,.chartGrid{grid-template-columns:1fr}
    }
    @media (max-width:640px){
      .shell{padding:16px}
      .grid{grid-template-columns:1fr}
      .ingestionGrid{grid-template-columns:1fr}
      .provenanceStrip{grid-template-columns:1fr}
      .metricRow{grid-template-columns:34px minmax(0,1fr)}
      .metricRow .score{grid-column:2}
      .metricExplanation{grid-template-columns:1fr}
      h1{font-size:26px}
    }
  </style>
</head>

        <button class="pill" id="refreshState" type="button" aria-label="Refresh conformance dashboard data now">loading</button>
        <a class="button" href="http://127.0.0.1:8000/">Game</a>
        <a class="button" href="http://127.0.0.1:8000/release-dashboard.html">Release</a>
        <a class="button" href="/RELEASE_CONFORMANCE_DASHBOARD.md">Markdown</a>
      </nav>
    </header>
    <main id="app"></main>
    <p class="statusLine" id="statusLine"></p>
  </div>

tiveRead":"The past focused block substantially improved our honesty and repeatability, but only modestly improved player-facing conformance. Challenge stages are now scored with a strict 1/10 baseline and have risen to 3.8/10; that is a real improvement from the strict 2.5/10 baseline, but still far from human-level Galaga conformance. The biggest remaining failures are movement grammar, alien novelty, stage-to-stage challenge progression, and stable audio runtime promotion.","workWindow":{"label":"Estimated focused conformance work block","estimatedHours":10,"basis":"Committed artifacts, challenge-stage history, quality score history, dashboard cost context, candidate sweep reports, and current audio/application artifacts. Some Codex/model/human orchestration time is estimated because it was not automatically logged."},"movedMost":["Strict challenge-stage truth improved: the old broad read around 6.1/10 was replaced by a stricter baseline at 2.5/10, then recovered to 3.8/10. This is progress, but it is mostly better measurement plus partial graphical evidence, not a solved gameplay problem.","Challenge graphical conformance moved from 2.1/10 to 4.3/10 after object-track/static visual evidence landed.","Overall quality under the strict challenge metric moved only 8.7/10 -\u003e 8.8/10, which is an honest signal that the user-visible game has not leapt forward as much as the harness did."],"movedLeast":["Alien novelty remains 3.4/10; it did not materially move during the focused block.","Stage-to-stage challenge progression remains 3/10; late challenges still do not yet read as distinct Galaga-like lessons.","Challenge movement conformance is only 3.4/10 and has plateaued relative to the amount of analysis effort.","Audio runtime promotion is still zero accepted cues even though cue contracts and candidate loops improved the process."],"failurePatterns":["Challenge-stage layout sweeps are too shallow for the real problem. The gap is trajectory grammar, entry/exit choreography, alien-family staging, and temporal sprite motion, not just spawn timing and lane offsets.","Audio candidate loops are optimizing isolated clips faster than they are improving full-theme live capture. Reference-vs-reference calibration and repeated full-theme stability gates must come before more runtime promotion.","Some graphics artifacts are useful to the harness but not useful enough to a human reviewer. Dense contact sheets and tiny \"view larger\" images need to become stage-by-stage temporal crop strips and object-track overlays.","The economics ledger still undercounts Codex/model/human orchestration time. The charts correctly show measured local CPU/browser spend, but cloud/model work is only visible when manually logged.","High broad scores can mask low strict scores. The broad alien/challenge novelty score is useful context, but the strict challenge-stage set-piece score is the one that matches the human complaint."],"recommendations":["Make challenge-stage path grammar the next primary gameplay investment: define per-challenge contracts for group order, first-visible frame, path length, turn count, exit side, alien family, animation phases, and bonus-shot opportunity.","Build direct target object tracks from the supplied Galaga challenge videos and compare Aurora tracks against those trajectories before authoring another large sweep.","Replace dense challenge contact sheets in the human docs with larger expandable crop sequences: reference target strip, Aurora current strip, object-track overlay, and per-axis score.","Freeze audio runtime promotion until reference-vs-reference and current-vs-current variance is known for challengePerfect, challengeTransition, gameOver, captureBeam, and stagePulse.","Log every multi-hour cycle with `npm run harness:measure`, and add a manual GPU-equivalent Codex entry whenever model work materially designs, interprets, or changes the harness.","Treat the next beta justification as requiring visible player-facin   <script>
    const app = document.getElementById('app');
    const refreshState = document.getElementById('refreshState');
    const gameSelector = document.getElementById('gameSelector');
    const statusLine = document.getElementById('statusLine');
    let dashboard = JSON.parse(document.getElementById('initial-data').textContent);
    let lastRefresh = Date.now();
    const locationUrl = new URL(location.href);
    const requestedGameKey = String(locationUrl.searchParams.get('game') || '').trim();
    let activeTab = ['conformance', 'cost', 'ingestion'].includes(location.hash.replace('#', '')) ? location.hash.replace('#', '') : 'conformance';
    let activeDetail = null;
    let activeGameKey = requestedGameKey || localStorage.getItem('platinumConformanceDashboardGame') || dashboard.activeGameKey || 'aurora-galactica';
    const refreshMs = 30000;
    const dataHref = "conformance-dashboard-data.json";
    const artifactBase = "../";
    const rawArtifactBase = "../";
    const pageMeta = {"artifactName":"Aurora Conformance Dashboard","releasePathLabel":"Local development dashboard","releasePath":"local-dev/conformance-dashboard.html via http://127.0.0.1:4312","releaseLane":"local-dev","buildLabel":"local generated dashboard","pageBuiltAt":"2026-05-24T07:35:59.434Z","pageCommit":"ff249bba","pageBranch":"codex/macbook-challenge-stage-conformance-cycle","sourceArtifact":"reference-artifacts/analyses/release-conformance-dashboard/latest.json","dataHref":"conformance-dashboard-data.json"};

    function esc(value){
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[char]));
    }

    function scoreClass(score){
      if(!Number.isFinite(Number(score))) return 'watch';
      if(Number(score) >= 9) return 'good';
      if(Number(score) >= 8) return 'watch';
      return 'gap';
    }

    function ageText(iso){
      const then = new Date(iso).getTime();
      if(!Number.isFinite(then)) return 'unknown age';
      const seconds = Math.max(0, Math.round((Date.now() - then) / 1000));
      if(seconds < 90) return seconds + 's old';
      const minutes = Math.round(seconds / 60);
      if(minutes < 90) return minutes + 'm old';
      return Math.round(minutes / 60) + 'h old';
    }

    function formatStamp(iso){
      const then = new Date(iso);
      if(!Number.isFinite(then.getTime())) return '--';
      return then.toLocaleString(undefined, {
        year:'numeric',
        month:'short',
        day:'2-digit',
        hour:'numeric',
        minute:'2-digit',
        timeZoneName:'short'
      });
    }

    function provenanceStrip(rootData, data){
      const sourceGeneratedAt = rootData.generatedAt || data.generatedAt || '';
      const sourceCommit = rootData.commit || data.commit || pageMeta.pageCommit || '';
      const sourceBranch = rootData.branch || data.branch || pageMeta.pageBranch || '';
      const dirty = rootData.dirty ?? data.dirty;
      const dirtyText = dirty ? 'dirty source state' : 'clean source state';
      return '<section class="provenanceStrip" aria-label="Artifact release path and freshness">'
        + '<article class="provenanceCard"><span class="label">Release Path</span><strong>' + esc(pageMeta.releasePathLabel) + '</strong><small>' + esc(pageMeta.releasePath) + '</small></article>'
        + '<article class="provenanceCard"><span class="label">Release Lane</span><strong>' + esc(pageMeta.releaseLane) + '</strong><small>' + esc(pageMeta.buildLabel) + '</small></article>'
        + '<article class="provenanceCard"><span class="label">Page Updated</span><strong>' + esc(formatStamp(pageMeta.pageBuiltAt)) + '</strong><small>HTML generated from build path</small></article>'
        + '<article class="provenanceCard"><span class="label">Source Data Updated</span><strong>' + esc(formatStamp(sourceGeneratedAt)) + '</strong><small>' + esc(ageText(sourceGeneratedAt)) + ' · ' + esc(pageMeta.sourceArtifact) + '</small></article>'
        + '<article class="provenanceCard"><span class="label">Source Commit</span><strong>' + esc(sourceCommit || '--') + '</strong><small>' + esc(sourceBranch || '--') + ' · ' + dirtyText + '</small></article>'
        + '</section>';
    }

    function evidenceLinks(reports){
      return Object.entries(reports || {})
        .filter(([, value]) => value)
        .map(([key, value]) => '<a href="' + artifactHref(value) + '">' + esc(key) + ': ' + esc(value) + '</a>')
        .join('');
    }

    function artifactHref(value){
      if(!value) return '#';
      if(/^https?:/i.test(value)) return value;
      return artifactBase + encodeURI(value);
    }

    function rawArtifactHref(value){
      if(!value) return '#';
      if(/^https?:/i.test(value)) return value;
      return rawArtifactBase + encodeURI(value);
    }

    function gameProfiles(){
      const games = Array.isArray(dashboard.games) ? dashboard.games : [];
      if(games.length) return games;
      return [{
        gameKey: dashboard.activeGameKey || 'aurora-galactica',
        gameName: 'Aurora Galactica',
        gameStatus: 'Active conformance investment',
        currentInvestment: 'Current focus: raise Aurora conformance toward the next major release gate.',
        releaseRead: 'Aurora is the current dashboard subject.',
        releaseGate: dashboard.releaseGate || [],
        priorityRows: dashboard.priorityRows || [],
        ingestionSummary: dashboard.ingestionSummary || {},
        ingestionRows: dashboard.ingestionRows || [],
        economicsSummary: dashboard.economicsSummary || {},
        scoreSemantics: dashboard.scoreSemantics || {},
        sourceReports: dashboard.sourceReports || {},
        newFirstClassAxes: dashboard.newFirstClassAxes || []
      }];
    }

    function selectedGame(){
      const games = gameProfiles();
      const selected = games.find(game => game.gameKey === activeGameKey) || games[0] || {};
      activeGameKey = selected.gameKey || activeGameKey;
      return Object.assign({}, dashboard, selected, {
        releaseGate: selected.releaseGate || dashboard.releaseGate || [],
        priorityRows: selected.priorityRows || dashboard.priorityRows || [],
        ingestionSummary: selected.ingestionSummary || dashboard.ingestionSummary || {},
        ingestionRows: selected.ingestionRows || dashboard.ingestionRows || [],
        economicsSummary: selected.economicsSummary || dashboard.economicsSummary || {},
        scoreSemantics: selected.scoreSemantics || dashboard.scoreSemantics || {},
        sourceReports: selected.sourceReports || dashboard.sourceReports || {},
        newFirstClassAxes: selected.newFirstClassAxes || dashboard.newFirstClassAxes || []
      });
    }

    function syncGameSelector(){
      const games = gameProfiles();
      gameSelector.innerHTML = games.map(game => {
        const selected = game.gameKey === activeGameKey ? ' selected' : '';
        const label = (game.gameName || game.gameKey || 'Unknown game') + (game.gameStatus ? ' - ' + game.gameStatus : '');
        return '<option value="' + esc(game.gameKey || '') + '"' + selected + '>' + esc(label) + '</option>';
      }).join('');
      if(!games.some(game => game.gameKey === activeGameKey) && games[0]){
        activeGameKey = games[0].gameKey;
        gameSelector.value = activeGameKey;
      }
    }

    function syncLocationState(){
      const nextUrl = new URL(location.href);
      if(activeGameKey) nextUrl.searchParams.set('game', activeGameKey);
      else nextUrl.searchParams.delete('game');
      nextUrl.hash = activeTab ? '#' + activeTab : '';
      history.replaceState(null, '', nextUrl.pathname + nextUrl.search + nextUrl.hash);
    }

    function gameShareHref(gameKey){
      const nextUrl = new URL(location.href);
      if(gameKey) nextUrl.searchParams.set('game', gameKey);
      else nextUrl.searchParams.delete('game');
      nextUrl.hash = '#conformance';
      return nextUrl.pathname + nextUrl.search + nextUrl.hash;
    }

    function explanationBlock(label, value){
      return '<div class="explainBlock"><span class="explainLabel">' + esc(label) + '</span>' + esc(value || 'Not yet documented for this metric.') + '</div>';
    }

    function metricCell(row){
      const explanation = row.explanation || {};
      const scoreContext = row.scoreContext || {};
      const costContext = row.costContext || {};
      return '<details class="metricDetails">'
        + '<summary><span>' + esc(row.metric) + '</span></summary>'
        + '<div class="metricExplanation">'
        + '<div class="metricExplanationHeader"><span class="metricExplanationTitle">' + esc(row.metric) + '</span><button class="closeDetails" type="button">Close</button></div>'
        + explanationBlock('Score meaning', scoreContext.scoreMeaning)
        + explanationBlock('Confidence', scoreContext.confidence)
        + explanationBlock('Resolution', scoreContext.resolution)
        + explanationBlock('Tracked spend', costContext.trackedSpend)
        + explanationBlock('Expected resources', costContext.expectedResources)
        + explanationBlock('Value / cost read', costContext.valueCostRead)
        + explanationBlock('Calculation', explanation.calculation)
        + explanationBlock('Grounding best case', explanation.grounding)
        + explanationBlock('Player / designer meaning', explanation.meaning)
        + '</div>'
        + '</details>';
    }

    function anchorLink(value){
      if(!value) return '--';
      const text = esc(value);
      const href = artifactHref(value);
      return '<a href="' + esc(href) + '">' + text + '</a>';
    }

    function dashboardTabs(){
      return '<div class="tabs" role="tablist" aria-label="Dashboard views">'
        + '<button class="tab ' + (activeTab === 'conformance' ? 'active' : '') + '" type="button" data-tab="conformance" role="tab" aria-selected="' + (activeTab === 'conformance') + '">Conformance</button>'
        + '<button class="tab ' + (activeTab === 'cost' ? 'active' : '') + '" type="button" data-tab="cost" role="tab" aria-selected="' + (activeTab === 'cost') + '">Cost / Value</button>'
        + '<button class="tab ' + (activeTab === 'ingestion' ? 'active' : '') + '" type="button" data-tab="ingestion" role="tab" aria-selected="' + (activeTab === 'ingestion') + '">Ingestion</button>'
        + '</div>';
    }

    function compareCards(){
      const games = gameProfiles();
      if(!games.length) return '';
      return '<section id="compare-games"><h2>Aurora And Guardians At A Glance</h2><div class="compareGrid">' + games.map(game => {
        const rows = Array.isArray(game.priorityRows) ? game.priorityRows : [];
        const gates = Array.isArray(game.releaseGate) ? game.releaseGate : [];
        const overall = gates.find(gate => gate.Gate === 'Overall quality');
        const previewOverall = gates.find(gate => /reference conformance|playtest-weighted/i.test(gate.Gate || ''));
        const weakest = rows
          .filter(row => Number.isFinite(Number(row.score10)))
          .sort((a, b) => Number(a.score10) - Number(b.score10))[0] || null;
        const isActive = game.gameKey === activeGameKey;
        return '<article class="compareCard">'
          + '<div><span class="label">Game</span><span class="value">' + esc(game.gameName || game.gameKey || 'Unknown game') + '</span><div class="small">' + esc(game.gameStatus || 'Conformance profile') + '</div></div>'
          + '<div class="compareMeta">'
          + '<div><span class="label">Overall</span><div class="score ' + scoreClass(overall?.Current || previewOverall?.Current) + '">' + esc(overall?.Current || previewOverall?.Current || '--') + '</div></div>'
          + '<div><span class="label">Weakest Gap</span><div class="small">' + esc(weakest?.metric || 'No scored gap yet') + '</div><div class="score ' + scoreClass(weakest?.score10) + '">' + esc(weakest?.current || '--') + '</div></div>'
          + '</div>'
          + '<div class="small">' + esc(game.currentInvestment || game.releaseRead || 'No current investment summary yet.') + '</div>'
          + '<div class="compareActions">'
          + '<a class="button" href="' + esc(gameShareHref(game.gameKey || '')) + '">' + (isActive ? 'Current view' : 'Open this game') + '</a>'
          + '</div>'
          + '</article>';
      }).join('') + '</div></section>';
    }

    function rowDetailKey(type, index){
      return type + ':' + index;
    }

    function selectedDetail(type, rows){
      if(!activeDetail || !activeDetail.startsWith(type + ':')) return null;
      const index = Number(activeDetail.split(':')[1]);
      if(!Number.isInteger(index) || index < 0 || index >= rows.length) return null;
      return { index, row: rows[index] };
    }

    function metricRow(row, index){
      const detailKey = rowDetailKey('metric', index);
      const isExpanded = activeDetail === detailKey;
      return '<article class="metricRow' + (isExpanded ? ' expanded' : '') + '" data-detail-row="' + esc(detailKey) + '">'
        + '<div class="priority">' + esc(row.rank || index + 1) + '</div>'
        + '<div><div class="metricName">' + esc(row.metric) + '</div><div class="metricSub">' + esc(row.why || row.status || '') + '</div></div>'
        + '<div class="score ' + scoreClass(row.score10) + '">' + esc(row.current || '--') + '</div>'
        + '<div class="costCell"><span class="badge">' + esc(row.costContext?.costClass || '--') + '</span><div class="small">' + esc(row.costContext?.trackedSpend || row.effort || '--') + '</div></div>'
        + '<div class="metricNext">' + esc(row.next || row.status || '--') + '</div>'
        + '<button class="detailButton" type="button" data-detail="' + esc(detailKey) + '" aria-expanded="' + (isExpanded ? 'true' : 'false') + '">' + (isExpanded ? 'Close' : 'Details') + '</button>'
        + (isExpanded ? metricDetailPanel(row) : '')
        + '</article>';
    }

    function metricDetailPanel(row){
      const explanation = row.explanation || {};
      const scoreContext = row.scoreContext || {};
      const costContext = row.costContext || {};
      return '<section class="detailPanel" id="metricDetailPanel">'
        + '<div class="detailHeader"><div><span class="label">Metric drill-down</span><h2>' + esc(row.metric) + '</h2><p class="small">' + esc(row.status || '') + '</p></div><button class="backButton" type="button" data-detail-back="1">Close details</button></div>'
        + '<div class="detailGrid">'
        + explanationBlock('Score meaning', scoreContext.scoreMeaning)
        + explanationBlock('Confidence', scoreContext.confidence)
        + explanationBlock('Resolution', scoreContext.resolution)
        + explanationBlock('Cost / resources', costContext.summary || costContext.expectedResources)
        + explanationBlock('Tracked spend', costContext.trackedSpend)
        + explanationBlock('Value / cost read', costContext.valueCostRead)
        + explanationBlock('Calculation', explanation.calculation)
        + explanationBlock('Grounding best case', explanation.grounding)
        + explanationBlock('Player / designer meaning', explanation.meaning)
        + explanationBlock('Recommended next step', row.next)
        + explanationBlock('Evidence', row.evidence)
        + explanationBlock('Target', row.target)
        + '</div>'
        + '<details class="metricDetails" open><summary><span>Full metric row text</span></summary><div class="metricExplanation">'
        + explanationBlock('Why this matters', row.why)
        + explanationBlock('Effort', row.effort)
        + explanationBlock('Gap to target', costContext.gapToTarget)
        + '</div></details>'
        + '</section>';
    }

    function gateGrid(gates){
      return '<div class="overviewStack">' + gates.map(gate => (
        '<article class="card"><span class="label">' + esc(gate.Gate) + '</span><span class="value">' + esc(gate.Current) + '</span><div class="small">Target: ' + esc(gate.Target) + '</div><div class="small">' + esc(gate.Notes) + '</div></article>'
      )).join('') + '</div>';
    }

    function conformanceView(data, rows, gates, semantics){
      return `
        <div class="split">
          <section>
            <h2>Priority Investment Queue</h2>
            <div class="metricList">${rows.map(metricRow).join('')}</div>
          </section>
          <div>
            <section class="card">
              <h2>Score Semantics</h2>
              <p><strong>${esc(semantics.headline || 'Scores are current measured rollups, not perfection claims.')}</strong></p>
              <p class="small">${esc(semantics.tenOutOfTen || '10/10 means no known measured gap at the current scorer resolution.')}</p>
              <p class="small"><strong>Confidence:</strong> ${esc(semantics.confidence || 'Trust level for the score as a release signal.')}</p>
              <p class="small"><strong>Resolution:</strong> ${esc(semantics.resolution || 'How fine-grained the scorer is today.')}</p>
            </section>
            <section class="card">
              <h2>Release Gates</h2>
              ${gateGrid(gates.slice(0, 6))}
            </section>
            <section class="card">
              <h2>First-Class Axes</h2>
              <ul class="axisList">${(data.newFirstClassAxes || []).map(axis => '<li>' + esc(axis) + '</li>').join('')}</ul>
            </section>
            <section class="card">
              <h2>Artifact State</h2>
              <p><span class="label">Generated</span><strong>${esc(data.generatedAt || '--')}</strong> <span class="small">(${esc(ageText(data.generatedAt))})</span></p>
              <p><span class="label">Branch</span><strong>${esc(data.branch || '--')}</strong> at <strong>${esc(data.commit || '--')}</strong> <span class="${data.dirty ? 'dirty' : 'clean'}">${data.dirty ? 'dirty' : 'clean'}</span></p>
              <div class="evidence">${evidenceLinks(data.sourceReports)}</div>
            </section>
          </div>
        </div>
      `;
    }

    function ingestionView(data){
      const rows = Array.isArray(data.ingestionRows) ? data.ingestionRows : [];
      const summary = data.ingestionSummary || {};
      function ingestionDetailPanel(row){
        return `
          <section class="detailPanel">
            <div class="detailHeader">
              <div><span class="label">Ingestion drill-down</span><h2>${esc(row.source)}</h2><p class="small">Source / evidence family mapped to ${esc(row.linkedMetric || 'a conformance metric')}</p></div>
              <button class="backButton" type="button" data-detail-back="1">Close details</button>
            </div>
            <div class="detailGrid">
              ${explanationBlock('Axis', row.axis)}
              ${explanationBlock('Artifact type', row.artifactType)}
              ${explanationBlock('Coverage', row.coverage)}
              ${explanationBlock('Annotation status', row.annotationStatus)}
              ${explanationBlock('Confidence', row.confidence)}
              ${explanationBlock('Linked metric', row.linkedMetric)}
              ${explanationBlock('Anchor', row.anchor)}
              ${explanationBlock('Missing next', row.next)}
            </div>
          </section>
        `;
      }
      return `
        <section>
          <h2>Ingestion Framework</h2>
          <p class="ingestionLead">${esc(summary.framing || 'Ingestion turns reference media and Aurora runtime captures into repeatable conformance evidence: clips, contact sheets, traces, event logs, labels, scores, confidence, and next missing annotations.')}</p>
          <div class="ingestionGrid">
            <div class="card"><span class="label">Evidence Families</span><span class="value">${esc(summary.sourceFamilyCount || rows.length || 0)}</span></div>
            <div class="card"><span class="label">Scored / Promoted</span><span class="value">${esc(summary.scoredOrPromotedCount || 0)}</span></div>
            <div class="card"><span class="label">High Confidence</span><span class="value">${esc(summary.highConfidenceCount || 0)}</span></div>
            <div class="card"><span class="label">Mixed / Low Confidence</span><span class="value">${esc(summary.mixedOrLowConfidenceCount || 0)}</span></div>
          </div>
          <section class="card">
            <h2>Next Best Ingestion Upgrade</h2>
            <p>${esc(summary.nextBestUpgrade || 'Promote the next evidence family into a scorer-backed artifact.')}</p>
          </section>
          <section>
            <h2>Evidence Pipeline Queue</h2>
            <span class="label">Source / evidence family</span>
            <div class="ingestionList">${rows.map((row, index) => {
              const detailKey = rowDetailKey('ingestion', index);
              const isExpanded = activeDetail === detailKey;
              return `
              <article class="ingestionItem${isExpanded ? ' expanded' : ''}" data-detail-row="${esc(detailKey)}">
                <div><span class="badge">Priority ${esc(row.rank || index + 1)}</span></div>
                <div class="metricName">${esc(row.source)}</div>
                <div class="ingestionMeta"><span class="badge">${esc(row.axis)}</span><span class="badge">${esc(row.confidence)}</span><span class="badge">${esc(row.annotationStatus)}</span></div>
                <div class="small"><strong>Coverage:</strong> ${esc(row.coverage)} · <strong>Artifact:</strong> ${esc(row.artifactType)}</div>
                <div class="small"><strong>Missing next:</strong> ${esc(row.next)}</div>
                <button class="detailButton" type="button" data-detail="${esc(detailKey)}" aria-expanded="${isExpanded ? 'true' : 'false'}">${isExpanded ? 'Close' : 'Details'}</button>
                ${isExpanded ? ingestionDetailPanel(row) : ''}
              </article>`;
            }).join('')}</div>
          </section>
        </section>
      `;
    }

    function tableFromRows(rows, empty){
      if(!Array.isArray(rows) || !rows.length) return '<p class="small">' + esc(empty || 'No rows available yet.') + '</p>';
      const headers = Object.keys(rows[0]);
      return '<table class="compactTable"><thead><tr>' + headers.map(header => '<th>' + esc(header) + '</th>').join('') + '</tr></thead><tbody>'
        + rows.map(row => '<tr>' + headers.map(header => '<td>' + esc(row[header]) + '</td>').join('') + '</tr>').join('')
        + '</tbody></table>';
    }

    function chartTitle(value){
      const name = String(value || '').split('/').pop() || 'chart';
      return name.replace(/\.svg$/i, '').replace(/-/g, ' ');
    }

    function economicsCharts(economics){
      const charts = Array.isArray(economics.charts) ? economics.charts : [];
      if(!charts.length){
        return '<p class="small">No economics charts generated yet. Run the conformance economics analysis before release review.</p>';
      }
      return '<div class="chartGrid">' + charts.map(chart => {
        return '<article class="card chartCard">'
          + '<h2>' + esc(chartTitle(chart)) + '</h2>'
          + '<a href="' + esc(artifactHref(chart)) + '"><img src="' + esc(rawArtifactHref(chart)) + '" alt="' + esc(chartTitle(chart)) + ' chart"></a>'
          + '<div class="chartLinks"><a href="' + esc(artifactHref(chart)) + '">Open artifact</a><a href="' + esc(dataHref) + '">Open dashboard data</a></div>'
          + '</article>';
      }).join('') + '</div>';
    }

    function computeApplicationPanel(economics){
      const application = economics.computeApplication || {};
      const gpuRows = (application.gpuUseByPurpose || []).slice(0, 5).map(row => ({
        Purpose: row.purpose,
        Runs: row.runs,
        Wall: Math.round((row.wallSeconds || 0) / 60) + ' min',
        Share: (row.sharePercent ?? 0) + '%'
      }));
      const cpuRows = (application.cpuUseByPurpose || []).slice(0, 5).map(row => ({
        Purpose: row.purpose,
        Runs: row.runs,
        Wall: Math.round((row.wallSeconds || 0) / 60) + ' min',
        Share: (row.sharePercent ?? 0) + '%'
      }));
      const impactRows = (application.gameplayImprovementByPart || []).slice(0, 5).map(row => ({
        'Project part': row.part,
        Movement: '+' + row.positiveScore10,
        Share: (row.sharePercent ?? 0) + '%'
      }));
      const limitations = Array.isArray(application.limitations) ? application.limitations : [];
      return '<section class="card">'
        + '<h2>CPU / GPU Application</h2>'
        + '<p class="small">Purpose charts distinguish local CPU/browser harness work from declared GPU-equivalent Codex/OpenAI/model/API work, then compare that spend with best-effort score movement by project area.</p>'
        + '<div class="costPanelGrid">'
        + '<section><h2>GPU-Equivalent Purpose</h2>' + tableFromRows(gpuRows, 'No declared GPU-equivalent purpose rows yet.') + '</section>'
        + '<section><h2>Local CPU Purpose</h2>' + tableFromRows(cpuRows, 'No tracked local CPU/browser purpose rows yet.') + '</section>'
        + '<section><h2>Gameplay Improvement</h2>' + tableFromRows(impactRows, 'No positive score movement attribution yet.') + '</section>'
        + '</div>'
        + (limitations.length ? '<p class="small">' + esc(limitations[0]) + '</p>' : '')
        + '</section>';
    }

    function retrospectivePanel(economics){
      const retro = economics.retrospective || {};
      if(!retro || !retro.executiveRead) return '';
      const hasNumber = value => value !== null && value !== undefined && Number.isFinite(Number(value));
      const moves = (retro.metricMovements || []).slice(0, 8).map(row => ({
        Metric: row.label,
        Start: hasNumber(row.startScore10) ? Number(row.startScore10).toFixed(1) + '/10' : 'n/a',
        Current: hasNumber(row.currentScore10) ? Number(row.currentScore10).toFixed(1) + '/10' : 'n/a',
        Delta: hasNumber(row.delta10) ? (Number(row.delta10) >= 0 ? '+' : '') + row.delta10 : 'n/a',
        Read: row.progressClass || ''
      }));
      const links = (retro.deepLinks || []).slice(0, 4).map(link => {
        const href = link.href && (/^https?:/.test(link.href) || /.html(?:[?#]|$)/.test(link.href)) ? link.href : artifactHref(link.href || retro.sourceReport || '');
        return '<a href="' + esc(href) + '">' + esc(link.label || 'Open') + '</a>';
      }).join('');
      const chartData = (retro.charts || []).map(chart => ({
        title: chartTitle(chart),
        href: artifactHref(chart),
        src: rawArtifactHref(chart)
      }));
      const chartMarkup = chartData.length
        ? '<div class="chartGrid">' + chartData.map(chart => '<article class="card chartCard"><h2>' + esc(chart.title) + '</h2><a href="' + esc(chart.href) + '"><img src="' + esc(chart.src) + '" alt="' + esc(chart.title) + ' chart"></a></article>').join('') + '</div>'
        : '';
      return '<section class="card">'
        + '<h2>Self-Critical Work Block</h2>'
        + '<p class="small">' + esc(retro.executiveRead) + '</p>'
        + '<div class="chartLinks">' + links + '</div>'
        + tableFromRows(moves, 'No retrospective metric movement rows generated yet.')
        + chartMarkup
        + '</section>';
    }

    function costView(data, rows){
      const economics = data.economicsSummary || {};
      return `
        <section>
          <h2>Cost / Value</h2>
          <p class="small">This is the primary graphical deep dive for conformance economics: score movement versus measured local CPU/browser work, GPU-equivalent model/API usage, artifact growth, and expected metric lift. Use it to decide which conformance axis deserves the next long compute cycle.</p>
          <div class="costStrip">
            <div class="card"><span class="label">Measured runs</span><span class="value">${esc(economics.measuredRuns || 0)}</span></div>
            <div class="card"><span class="label">Wall time</span><span class="value">${esc(Math.round((economics.wallSeconds || 0) / 60))} min</span></div>
            <div class="card"><span class="label">CPU time</span><span class="value">${esc(Math.round((economics.cpuSeconds || 0) / 60))} min</span></div>
          </div>
          ${retrospectivePanel(economics)}
          ${computeApplicationPanel(economics)}
          <section class="card">
            <h2>Economics Charts</h2>
            ${economicsCharts(economics)}
          </section>
          <div class="costPanelGrid">
            <section class="card">
              <h2>Metric Investment Read</h2>
              <div class="metricList">${rows.slice(0, 5).map(metricRow).join('')}</div>
            </section>
            <section class="card">
              <h2>Resource Spend</h2>
              ${tableFromRows(data.resourceSpendTable, 'No resource spend table generated yet.')}
              <h2 style="margin-top:14px">Axis Spend</h2>
              ${tableFromRows((data.axisSpendTable || []).slice(0, 8), 'No axis spend table generated yet.')}
            </section>
          </div>
        </section>
      `;
    }

    function render(rootData){
      syncGameSelector();
      const data = selectedGame();
      const rows = Array.isArray(data.priorityRows) ? data.priorityRows : [];
      const gates = Array.isArray(data.releaseGate) ? data.releaseGate : [];
      const overall = gates.find(gate => gate.Gate === 'Overall quality');
      const previewOverall = gates.find(gate => /reference conformance|playtest-weighted/i.test(gate.Gate || ''));
      const audio = rows.find(row => /Audio identity/.test(row.metric || ''));
      const level = rows.find(row => /Level arc/.test(row.metric || ''));
      const weakest = rows
        .filter(row => Number.isFinite(Number(row.score10)))
        .sort((a, b) => Number(a.score10) - Number(b.score10))[0] || null;
      const primaryGap = audio || weakest;
      const semantics = data.scoreSemantics || {};
      const economics = data.economicsSummary || {};
      syncLocationState();
      app.innerHTML = `
        ${provenanceStrip(rootData, data)}
        <div class="grid">
          <div class="card"><span class="label">Selected Game</span><span class="value">${esc(data.gameName || 'Current game')}</span><div class="small">${esc(data.gameStatus || 'Conformance profile')}</div></div>
          <div class="card"><span class="label">Overall / Status</span><span class="value">${esc(overall?.Current || previewOverall?.Current || '--')}</span><div class="small">${esc(data.currentInvestment || data.releaseRead || 'No game status summary yet.')}</div></div>
          <div class="card"><span class="label">Weakest Major Gap</span><span class="value ${scoreClass(primaryGap?.score10)}">${esc(primaryGap?.current || '--')}</span><div class="small">${esc(primaryGap?.metric || 'No scored gap yet')}</div></div>
          <div class="card"><span class="label">Level / Primary Arc</span><span class="value ${scoreClass(level?.score10 || weakest?.score10)}">${esc(level?.current || weakest?.current || '--')}</span><div class="small">${esc(level ? 'Encounter shape and escalation' : (weakest?.metric || 'Awaiting scored metric'))}</div></div>
          <div class="card"><span class="label">Tracked Compute</span><span class="value">${esc(economics.measuredRuns || 0)} runs</span><div class="small">${esc(Math.round((economics.wallSeconds || 0) / 60))} min wall / ${esc(Math.round((economics.cpuSeconds || 0) / 60))} min CPU</div></div>
        </div>
        ${compareCards()}
        ${dashboardTabs()}
        ${activeTab === 'ingestion' ? ingestionView(data) : activeTab === 'cost' ? costView(data, rows) : conformanceView(data, rows, gates, semantics)}
      `;
      statusLine.textContent = 'Release path: ' + pageMeta.releasePathLabel + ' (' + pageMeta.releasePath + '). Page updated: ' + formatStamp(pageMeta.pageBuiltAt) + '. Dashboard data: ' + (rootData.generatedAt || data.generatedAt || 'unknown') + '. Selected game: ' + (data.gameName || activeGameKey) + '. Page refreshes conformance-dashboard-data.json every 30 seconds.';
    }

    app.addEventListener('click', event => {
      function detailRow(key){
        return [...document.querySelectorAll('[data-detail-row]')].find(row => row.dataset.detailRow === key) || null;
      }
      const tab = event.target.closest('[data-tab]');
      if(tab){
        activeTab = tab.dataset.tab || 'conformance';
        activeDetail = null;
        history.replaceState(null, '', '#' + activeTab);
        render(dashboard);
        return;
      }
      const detailButton = event.target.closest('[data-detail]');
      if(detailButton){
        const key = detailButton.dataset.detail || null;
        activeDetail = activeDetail === key ? null : key;
        render(dashboard);
        const row = detailRow(key);
        if(row) row.scrollIntoView({ block:'nearest' });
        const nextButton = row?.querySelector('[data-detail]');
        if(nextButton) nextButton.focus({ preventScroll:true });
        return;
      }
      const backButton = event.target.closest('[data-detail-back]');
      if(backButton){
        const key = activeDetail;
        activeDetail = null;
        render(dashboard);
        const row = detailRow(key);
        if(row) row.scrollIntoView({ block:'nearest' });
        return;
      }
      const button = event.target.closest('.closeDetails');
      if(!button) return;
      const details = button.closest('details');
      if(details) details.open = false;
    });

    gameSelector.addEventListener('change', () => {
      activeGameKey = gameSelector.value || activeGameKey;
      activeDetail = null;
      localStorage.setItem('platinumConformanceDashboardGame', activeGameKey);
      render(dashboard);
    });

    async function refresh(){
      try{
        refreshState.disabled = true;
        refreshState.textContent = 'refreshing';
        const response = await fetch(dataHref + '?ts=' + Date.now(), { cache:'no-store' });
        if(!response.ok) throw new Error('HTTP ' + response.status);
        dashboard = await response.json();
        lastRefresh = Date.now();
        render(dashboard);
      }catch(err){
        refreshState.textContent = 'refresh failed';
        statusLine.textContent = 'Could not refresh dashboard data: ' + err.message;
      }finally{
        refreshState.disabled = false;
        tick();
      }
    }

    function tick(){
      const next = Math.max(0, Math.ceil((refreshMs - (Date.now() - lastRefresh)) / 1000));
      refreshState.textContent = 'refresh in ' + next + 's';
    }

    render(dashboard);
    tick();
    refreshState.addEventListener('click', refresh);
    setInterval(tick, 1000);
    setInterval(refresh, refreshMs);
  </script>
</body>
</html>
