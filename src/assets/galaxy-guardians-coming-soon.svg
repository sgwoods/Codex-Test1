  <text x="600" y="560" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="94" font-style="italic" font-weight="700" fill="#f6f8ff">Galaxy Guardians</text>
  <text x="600" y="616" text-anchor="middle" font-family="Courier New, Consolas, monospace" font-size="30" letter-spacing="8" fill="#89dcff">RETRO FORMATION ARCADE PRESSURE</text>
  <text x="600" y="664" text-anchor="middle" font-family="Courier New, Consolas, monospace" font-size="22" letter-spacing="4" fill="#dbeeff">FLAGSHIP ESCORTS · DIVE WAVES · PLATINUM PREVIEW</text>
</svg>
